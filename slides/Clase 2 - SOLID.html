ight:1.4;margin:14px 0 0;color:#33373f;\">La consola implementa <strong>solo<\u002Fstrong> lo que usa. La impresora de papel implementa <strong>las dos<\u002Fstrong> (en TS una clase puede implementar varias interfaces).<\u002Fp>\n<\u002Fsection>\n\n<section data-label=\"ISP — Olor\" data-screen-label=\"27\" data-speaker-notes=\"Olor a ISP: métodos vacíos, throw 'not supported' o null; interfaces enormes; cambiar un método rompe clases que ni lo usaban. Se parece a LSP: los métodos no soportados que tiran error aparecen en los dos.\" style=\"height:100%;box-sizing:border-box;background:#f4f1ea;color:#23262c;padding:72px 96px;display:flex;flex-direction:column;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.14em;text-transform:uppercase;color:oklch(0.55 0.14 25);margin-bottom:14px;\">ISP · Olor a código<\u002Fdiv>\n  <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:52px;font-weight:600;line-height:1.02;margin:0 0 36px;\">Sospechá violación de ISP cuando…<\u002Fh2>\n  <div style=\"display:flex;flex-direction:column;gap:26px;max-width:1600px;flex:1;\">\n    <p style=\"font-size:31px;line-height:1.45;margin:0;padding-left:34px;position:relative;\"><span style=\"position:absolute;left:0;color:oklch(0.55 0.14 25);\">›<\u002Fspan>Una clase implementa una interfaz pero <strong>deja métodos vacíos<\u002Fstrong>, con <code style=\"font-family:'IBM Plex Mono',monospace;background:#e9e2d4;padding:2px 8px;border-radius:5px;\">throw new Error(\"not supported\")<\u002Fcode> o devolviendo <code style=\"font-family:'IBM Plex Mono',monospace;background:#e9e2d4;padding:2px 8px;border-radius:5px;\">null<\u002Fcode>.<\u002Fp>\n    <p style=\"font-size:31px;line-height:1.45;margin:0;padding-left:34px;position:relative;\"><span style=\"position:absolute;left:0;color:oklch(0.55 0.14 25);\">›<\u002Fspan>Una interfaz tiene <strong>muchísimos métodos<\u002Fstrong> y ninguna clase los usa todos.<\u002Fp>\n    <p style=\"font-size:31px;line-height:1.45;margin:0;padding-left:34px;position:relative;\"><span style=\"position:absolute;left:0;color:oklch(0.55 0.14 25);\">›<\u002Fspan>Cambiás un método de una interfaz y <strong>te rompe clases que ni lo usaban<\u002Fstrong>.<\u002Fp>\n  <\u002Fdiv>\n  <div style=\"background:#1a1d23;color:#eef0f2;border-radius:12px;padding:24px 32px;\">\n    <p style=\"font-size:26px;line-height:1.4;margin:0;\">Fijate el parecido con <strong>LSP<\u002Fstrong>: los métodos \"no soportados\" que tiran error aparecen en los dos olores. Muchas veces una interfaz gorda es lo que <strong style=\"color:oklch(0.75 0.13 258);\">empuja<\u002Fstrong> a violar Liskov.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"D — DIP\" data-screen-label=\"28\" data-speaker-notes=\"D: depender de abstracciones, no de implementaciones concretas. Alto nivel y bajo nivel dependen de abstracciones. En vez de que mi clase cree lo que necesita, que lo reciba de afuera contra una interfaz.\" style=\"height:100%;box-sizing:border-box;background:#1a1d23;color:#eef0f2;padding:0;display:flex;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"width:640px;background:oklch(0.55 0.13 310);display:flex;align-items:center;justify-content:center;flex-shrink:0;\">\n    <span style=\"font-family:'Space Grotesk',sans-serif;font-size:440px;font-weight:700;color:#fff;line-height:1;\">D<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"flex:1;padding:92px 80px;display:flex;flex-direction:column;justify-content:center;\">\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.16em;text-transform:uppercase;color:oklch(0.76 0.12 310);margin-bottom:16px;\">Principio 5<\u002Fdiv>\n    <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:54px;font-weight:600;line-height:1.05;margin:0 0 24px;\">Inversión de Dependencias<\u002Fh2>\n    <p style=\"font-size:32px;line-height:1.45;margin:0 0 20px;color:#e6e8ec;\">Las clases deben depender de <strong>abstracciones<\u002Fstrong>, no de implementaciones concretas.<\u002Fp>\n    <p style=\"font-size:26px;line-height:1.45;margin:0 0 16px;color:#a9afbd;\">Los módulos de alto nivel no deben depender de los de bajo nivel. Ambos dependen de <strong>abstracciones<\u002Fstrong>; los detalles dependen de las abstracciones, no al revés.<\u002Fp>\n    <p style=\"font-size:25px;line-height:1.4;margin:0;color:#c5cad4;max-width:840px;\">En vez de que mi clase <strong style=\"color:#fff;\">cree<\u002Fstrong> por dentro lo que necesita, que lo <strong style=\"color:#fff;\">reciba desde afuera<\u002Fstrong> contra una interfaz.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"DIP — Antes\" data-screen-label=\"29\" data-speaker-notes=\"Computer crea por dentro un teclado y monitor concretos. Queda acoplada a StandardKeyboard y Monitor. Si quiero un teclado inalámbrico, no puedo: están cableados adentro.\" style=\"height:100%;box-sizing:border-box;background:#f4f1ea;color:#23262c;padding:56px 96px;display:flex;flex-direction:column;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:18px;\">\n    <span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.12em;text-transform:uppercase;color:#fff;background:oklch(0.58 0.14 25);padding:6px 18px;border-radius:6px;\">Antes<\u002Fspan>\n    <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:46px;font-weight:600;margin:0;\">DIP — las dependencias cableadas adentro<\u002Fh2>\n  <\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1.05fr 0.95fr;gap:48px;flex:1;min-height:0;align-items:center;\">\n    <div class=\"cd\"><pre style=\"font-size:23px;line-height:1.5;\"><code class=\"language-typescript\">class Computer {\n  private readonly keyboard: StandardKeyboard;\n  private readonly monitor: Monitor;\n\n  constructor() {\n    this.monitor = new Monitor();\n    this.keyboard = new StandardKeyboard();\n  }\n}<\u002Fcode><\u002Fpre><\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:24px;\">\n      <div style=\"display:flex;gap:18px;align-items:baseline;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:700;color:oklch(0.55 0.13 310);\">1<\u002Fspan><p style=\"font-size:28px;line-height:1.4;margin:0;\"><strong>Computer<\u002Fstrong> queda <strong>acoplada<\u002Fstrong> a <code style=\"font-family:'IBM Plex Mono',monospace;background:#e9e2d4;padding:2px 6px;border-radius:5px;\">StandardKeyboard<\u002Fcode> y <code style=\"font-family:'IBM Plex Mono',monospace;background:#e9e2d4;padding:2px 6px;border-radius:5px;\">Monitor<\u002Fcode>.<\u002Fp><\u002Fdiv>\n      <div style=\"display:flex;gap:18px;align-items:baseline;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:700;color:oklch(0.55 0.13 310);\">2<\u002Fspan><p style=\"font-size:28px;line-height:1.4;margin:0;\">Si quiero un teclado <strong>inalámbrico<\u002Fstrong> o un monitor distinto, <strong>no puedo<\u002Fstrong>: están cableados adentro.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Encontrá la línea\" data-screen-label=\"30\" data-speaker-notes=\"Señalá la línea que ata Computer con un teclado concreto. Si mañana querés un WirelessKeyboard, ¿podés sin tocar Computer? ¿Y si Computer lo recibiera de afuera?\" style=\"height:100%;box-sizing:border-box;background:#f0e9db;color:#23262c;padding:72px 96px;display:flex;flex-direction:column;justify-content:center;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.18em;text-transform:uppercase;color:oklch(0.62 0.13 70);margin-bottom:16px;\">Pará y pensá<\u002Fdiv>\n  <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:56px;font-weight:600;line-height:1.02;margin:0 0 48px;\">Encontrá la línea culpable<\u002Fh2>\n  <div style=\"display:flex;flex-direction:column;gap:32px;max-width:1550px;\">\n    <div style=\"display:flex;gap:28px;align-items:baseline;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:44px;font-weight:700;color:oklch(0.62 0.13 70);\">01<\u002Fspan><p style=\"font-size:32px;line-height:1.4;margin:0;\">Señalá <strong>la línea exacta<\u002Fstrong> que ata a <code style=\"font-family:'IBM Plex Mono',monospace;background:#e2d9c6;padding:2px 8px;border-radius:5px;\">Computer<\u002Fcode> con un teclado concreto.<\u002Fp><\u002Fdiv>\n    <div style=\"display:flex;gap:28px;align-items:baseline;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:44px;font-weight:700;color:oklch(0.62 0.13 70);\">02<\u002Fspan><p style=\"font-size:32px;line-height:1.4;margin:0;\">Si mañana querés un <code style=\"font-family:'IBM Plex Mono',monospace;background:#e2d9c6;padding:2px 8px;border-radius:5px;\">WirelessKeyboard<\u002Fcode>, ¿podés <strong>sin tocar<\u002Fstrong> Computer? ¿Por qué no?<\u002Fp><\u002Fdiv>\n    <div style=\"display:flex;gap:28px;align-items:baseline;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:44px;font-weight:700;color:oklch(0.62 0.13 70);\">03<\u002Fspan><p style=\"font-size:32px;line-height:1.4;margin:0;\">¿Y si Computer lo <strong>recibiera<\u002Fstrong> de afuera en vez de <strong>crearlo<\u002Fstrong> adentro? ¿Qué cambiaría?<\u002Fp><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"DIP — Después\" data-screen-label=\"31\" data-speaker-notes=\"Dependo de interfaces y las recibo por el constructor. El que arma la Computer decide qué implementación usar. Cambiar el teclado es cambiar quién le paso, sin tocar Computer. La flecha se invierte.\" style=\"height:100%;box-sizing:border-box;background:#f4f1ea;color:#23262c;padding:52px 80px;display:flex;flex-direction:column;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\">\n    <span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.12em;text-transform:uppercase;color:#fff;background:oklch(0.55 0.13 155);padding:6px 18px;border-radius:6px;\">Después<\u002Fspan>\n    <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:44px;font-weight:600;margin:0;\">DIP — recibir la abstracción, invertir la flecha<\u002Fh2>\n  <\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1.2fr 0.8fr;gap:44px;flex:1;min-height:0;align-items:center;\">\n    <div class=\"cd\"><pre style=\"font-size:20px;line-height:1.45;\"><code class=\"language-typescript\" data-comment-anchor=\"b58b9cee4a-code\">interface Keyboard { /* ... */ }\ninterface Monitor { /* ... */ }\n\nclass Computer {\n  private keyboard: Keyboard;\n  private monitor: Monitor;\n\n  constructor(keyboard: Keyboard, monitor: Monitor) {\n    this.keyboard = keyboard;   // me lo dan de afuera\n    this.monitor = monitor;\n  }\n}\n\n// El que arma la Computer decide QUÉ implementación usar:\nconst pc = new Computer(new WirelessKeyboard(), new OledMonitor());<\u002Fcode><\u002Fpre><\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;align-items:center;gap:0;\">\n      <div style=\"display:flex;gap:32px;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:600;background:#fff;border:2px solid #d8d2c4;border-radius:8px;padding:8px 12px;\">WirelessKeyboard<\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:600;background:#fff;border:2px solid #d8d2c4;border-radius:8px;padding:8px 12px;\">OledMonitor<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:96px;\"><div style=\"width:0;border-left:2px dashed #b7b1a3;height:16px;\"><\u002Fdiv><div style=\"width:0;border-left:2px dashed #b7b1a3;height:16px;\"><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;gap:22px;\"><div style=\"color:#b7b1a3;font-size:18px;line-height:0.4;\">△<\u002Fdiv><div style=\"color:#b7b1a3;font-size:18px;line-height:0.4;\">△<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;gap:22px;margin-top:2px;\">\n        <div style=\"background:#f2edf7;border:2px solid oklch(0.6 0.12 310);border-radius:8px;padding:7px 12px;font-family:'IBM Plex Mono',monospace;font-size:15px;font-style:italic;color:oklch(0.42 0.12 310);\">«interface»<br>Keyboard<\u002Fdiv>\n        <div style=\"background:#f2edf7;border:2px solid oklch(0.6 0.12 310);border-radius:8px;padding:7px 12px;font-family:'IBM Plex Mono',monospace;font-size:15px;font-style:italic;color:oklch(0.42 0.12 310);\">«interface»<br>Monitor<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:96px;margin-top:4px;\"><div style=\"color:#b7b1a3;font-size:18px;\">↑<\u002Fdiv><div style=\"color:#b7b1a3;font-size:18px;\">↑<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#1a1d23;color:#eef0f2;border-radius:8px;padding:10px 22px;font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;margin-top:2px;\">Computer<\u002Fdiv>\n      <p style=\"font-size:19px;line-height:1.4;color:oklch(0.42 0.12 310);text-align:center;margin:14px 4px 0;font-weight:600;\">Lo concreto depende de la abstracción: la dependencia se invirtió.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <p style=\"font-size:24px;line-height:1.4;margin:12px 0 0;color:#33373f;\"><strong>Computer<\u002Fstrong> depende de la abstracción <strong>Keyboard<\u002Fstrong>, no de <strong>StandardKeyboard<\u002Fstrong>. Cambiar el teclado es cambiar <strong>quién le paso<\u002Fstrong>, sin tocar Computer.<\u002Fp>\n<\u002Fsection>\n\n<section data-label=\"DIP — Olor\" data-screen-label=\"32\" data-speaker-notes=\"Olor a DIP: new de clases concretas dentro de una clase con lógica importante; cambiar un detalle de bajo nivel te obliga a tocar el negocio. Inversión = se da vuelta la flecha de dependencia.\" style=\"height:100%;box-sizing:border-box;background:#f4f1ea;color:#23262c;padding:72px 96px;display:flex;flex-direction:column;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.14em;text-transform:uppercase;color:oklch(0.55 0.14 25);margin-bottom:14px;\">DIP · Olor a código<\u002Fdiv>\n  <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:52px;font-weight:600;line-height:1.02;margin:0 0 40px;\">Sospechá violación de DIP cuando…<\u002Fh2>\n  <div style=\"display:flex;flex-direction:column;gap:30px;max-width:1600px;flex:1;\">\n    <p style=\"font-size:31px;line-height:1.45;margin:0;padding-left:34px;position:relative;\"><span style=\"position:absolute;left:0;color:oklch(0.55 0.14 25);\">›<\u002Fspan>Ves <code style=\"font-family:'IBM Plex Mono',monospace;background:#e9e2d4;padding:2px 8px;border-radius:5px;\">new<\u002Fcode> de clases concretas dentro de una clase que hace lógica importante (servicios, repositorios, conexiones).<\u002Fp>\n    <p style=\"font-size:31px;line-height:1.45;margin:0;padding-left:34px;position:relative;\"><span style=\"position:absolute;left:0;color:oklch(0.55 0.14 25);\">›<\u002Fspan>Cambiar un detalle de bajo nivel (proveedor de mail, motor de base) te obliga a tocar la <strong>lógica de negocio<\u002Fstrong>.<\u002Fp>\n  <\u002Fdiv>\n  <div style=\"background:#1a1d23;color:#eef0f2;border-radius:12px;padding:26px 34px;\">\n    <p style=\"font-size:27px;line-height:1.5;margin:0;\"><strong style=\"color:oklch(0.76 0.12 310);\">\"Inversión\"<\u002Fstrong> = se da vuelta la flecha. Sin DIP: <code style=\"font-family:'IBM Plex Mono',monospace;color:#e6e8ec;\">Computer → StandardKeyboard<\u002Fcode>. Con DIP: <code style=\"font-family:'IBM Plex Mono',monospace;color:#e6e8ec;\">Computer → Keyboard ← StandardKeyboard<\u002Fcode>. Ahora lo concreto depende de la abstracción.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Recap — los 5\" data-screen-label=\"33\" data-speaker-notes=\"Los 5 de un vistazo. El hilo conductor: casi todos se resuelven con interfaces, polimorfismo y bajar el acoplamiento. SOLID son 5 caras de 'código desacoplado'.\" style=\"height:100%;box-sizing:border-box;background:#1a1d23;color:#eef0f2;padding:64px 96px;display:flex;flex-direction:column;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.18em;text-transform:uppercase;color:oklch(0.72 0.13 258);margin-bottom:14px;\">Recap<\u002Fdiv>\n  <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:58px;font-weight:600;line-height:1.02;margin:0 0 40px;\">Los 5, de un vistazo<\u002Fh2>\n  <div style=\"display:flex;flex-direction:column;gap:16px;flex:1;\">\n    <div style=\"display:flex;align-items:center;gap:28px;border-bottom:1px solid #2e333c;padding-bottom:14px;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:44px;font-weight:700;color:oklch(0.62 0.13 258);width:46px;\">S<\u002Fspan><p style=\"font-size:28px;line-height:1.35;margin:0;\"><strong>Responsabilidad única<\u002Fstrong> → una razón para cambiar por clase.<\u002Fp><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:28px;border-bottom:1px solid #2e333c;padding-bottom:14px;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:44px;font-weight:700;color:oklch(0.62 0.13 155);width:46px;\">O<\u002Fspan><p style=\"font-size:28px;line-height:1.35;margin:0;\"><strong>Abierto/Cerrado<\u002Fstrong> → extender sin modificar (interfaces + polimorfismo).<\u002Fp><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:28px;border-bottom:1px solid #2e333c;padding-bottom:14px;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:44px;font-weight:700;color:oklch(0.7 0.13 70);width:46px;\">L<\u002Fspan><p style=\"font-size:28px;line-height:1.35;margin:0;\"><strong>Liskov<\u002Fstrong> → el hijo no rompe las promesas del padre.<\u002Fp><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:28px;border-bottom:1px solid #2e333c;padding-bottom:14px;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:44px;font-weight:700;color:oklch(0.66 0.13 25);width:46px;\">I<\u002Fspan><p style=\"font-size:28px;line-height:1.35;margin:0;\"><strong>Segregación de interfaces<\u002Fstrong> → interfaces chicas, nada de métodos que sobran.<\u002Fp><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:28px;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:44px;font-weight:700;color:oklch(0.66 0.13 310);width:46px;\">D<\u002Fspan><p style=\"font-size:28px;line-height:1.35;margin:0;\"><strong>Inversión de dependencias<\u002Fstrong> → depender de abstracciones, inyectar lo concreto.<\u002Fp><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"border-left:3px solid oklch(0.72 0.13 258);padding-left:28px;\">\n    <p style=\"font-size:27px;line-height:1.45;margin:0;color:#d5dae3;\">El hilo conductor: casi todos se resuelven con lo mismo → <strong style=\"color:#fff;\">interfaces, polimorfismo y bajar el acoplamiento<\u002Fstrong>. No son 5 ideas sueltas: son 5 caras de \"código desacoplado\".<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Ejercicio en vivo\" data-screen-label=\"34\" data-speaker-notes=\"Para cada caso: qué principio SOLID se rompe y cómo lo arreglarías. Pensalo antes de pasar a la solución.\" style=\"height:100%;box-sizing:border-box;background:#f0e9db;color:#23262c;padding:52px 72px;display:flex;flex-direction:column;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:8px;\">\n    <span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.14em;text-transform:uppercase;color:oklch(0.62 0.13 70);\">Ejercicio en vivo<\u002Fspan>\n  <\u002Fdiv>\n  <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:46px;font-weight:600;margin:0 0 24px;\">¿Qué principio se viola?<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:26px;flex:1;min-height:0;\">\n    <div style=\"display:flex;flex-direction:column;\">\n      <p style=\"font-family:'IBM Plex Mono',monospace;font-size:22px;color:oklch(0.5 0.13 70);font-weight:600;margin:0 0 10px;\">Caso 1<\u002Fp>\n      <div class=\"cd\" style=\"padding:18px 20px;flex:1;\"><pre style=\"font-size:16px;line-height:1.45;\"><code class=\"language-typescript\">class CalculadoraDescuento {\n  calcular(tipoCliente: string,\n           monto: number): number {\n    if (tipoCliente === \"regular\")\n      return monto * 0.95;\n    if (tipoCliente === \"premium\")\n      return monto * 0.90;\n    if (tipoCliente === \"vip\")\n      return monto * 0.80;\n    return monto;\n  }\n}<\u002Fcode><\u002Fpre><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;\">\n      <p style=\"font-family:'IBM Plex Mono',monospace;font-size:22px;color:oklch(0.5 0.13 70);font-weight:600;margin:0 0 10px;\">Caso 2<\u002Fp>\n      <div class=\"cd\" style=\"padding:18px 20px;flex:1;\"><pre style=\"font-size:16px;line-height:1.45;\"><code class=\"language-typescript\">class Ave {\n  volar(): void {\n    console.log(\"volando\");\n  }\n}\n\nclass Pinguino extends Ave {\n  volar(): void {\n    throw new Error(\"no vuelo\");\n  }\n}<\u002Fcode><\u002Fpre><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;\">\n      <p style=\"font-family:'IBM Plex Mono',monospace;font-size:22px;color:oklch(0.5 0.13 70);font-weight:600;margin:0 0 10px;\">Caso 3<\u002Fp>\n      <div class=\"cd\" style=\"padding:18px 20px;flex:1;\"><pre style=\"font-size:16px;line-height:1.45;\"><code class=\"language-typescript\">class ReporteVentas {\n  calcularTotales(): number {\n    /* lógica */ return 0;\n  }\n  exportarPDF(): void {\n    /* arma el PDF */\n  }\n  enviarPorEmail(): void {\n    /* manda el mail */\n  }\n}<\u002Fcode><\u002Fpre><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <p style=\"font-size:24px;line-height:1.4;margin:18px 0 0;color:#4a4f59;\">Para cada caso: <strong>qué principio se rompe<\u002Fstrong> y <strong>cómo lo arreglarías<\u002Fstrong>. Pensalo antes de pasar a la solución.<\u002Fp>\n<\u002Fsection>\n\n<section data-label=\"Ejercicio — soluciones\" data-screen-label=\"35\" data-speaker-notes=\"Caso 1: OCP (if crece → interfaz TipoCliente + una clase por tipo). Caso 2: LSP (Pinguino rompe volar → reordenar jerarquía). Caso 3: SRP (calcula, exporta y envía → tres clases). Arreglar OCP y LSP terminó otra vez en interfaces + polimorfismo.\" style=\"height:100%;box-sizing:border-box;background:#f4f1ea;color:#23262c;padding:60px 96px;display:flex;flex-direction:column;font-family:'IBM Plex Sans',sans-serif;\">\n  <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:52px;font-weight:600;margin:0 0 36px;\">Ejercicio en vivo — soluciones<\u002Fh2>\n  <div style=\"display:flex;flex-direction:column;gap:22px;flex:1;\">\n    <div style=\"display:flex;gap:26px;align-items:baseline;\">\n      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:600;color:#fff;background:oklch(0.56 0.13 155);padding:5px 14px;border-radius:6px;white-space:nowrap;\">1 · OCP<\u002Fspan>\n      <p style=\"font-size:28px;line-height:1.45;margin:0;\">La cadena de <code style=\"font-family:'IBM Plex Mono',monospace;background:#e9e2d4;padding:2px 8px;border-radius:5px;\">if<\u002Fcode> crece con cada tipo de cliente. Definir <code style=\"font-family:'IBM Plex Mono',monospace;background:#e9e2d4;padding:2px 8px;border-radius:5px;\">interface TipoCliente { descuento(monto) }<\u002Fcode> y una clase por tipo. Agregar un tipo = agregar una clase.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:26px;align-items:baseline;\">\n      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:600;color:#fff;background:oklch(0.63 0.13 70);padding:5px 14px;border-radius:6px;white-space:nowrap;\">2 · LSP<\u002Fspan>\n      <p style=\"font-size:28px;line-height:1.45;margin:0;\"><strong>Pinguino<\u002Fstrong> rompe la promesa de <code style=\"font-family:'IBM Plex Mono',monospace;background:#e9e2d4;padding:2px 8px;border-radius:5px;\">volar()<\u002Fcode>. Reordenar: <strong>Ave<\u002Fstrong> con lo común y <strong>AveVoladora<\u002Fstrong> (o interfaz <strong>Volador<\u002Fstrong>) solo para las que vuelan. El pingüino no hereda <code style=\"font-family:'IBM Plex Mono',monospace;background:#e9e2d4;padding:2px 8px;border-radius:5px;\">volar()<\u002Fcode>.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:26px;align-items:baseline;\">\n      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:600;color:#fff;background:oklch(0.58 0.13 258);padding:5px 14px;border-radius:6px;white-space:nowrap;\">3 · SRP<\u002Fspan>\n      <p style=\"font-size:28px;line-height:1.45;margin:0;\"><strong>ReporteVentas<\u002Fstrong> calcula, exporta <em>y<\u002Fem> envía: tres razones para cambiar. Separar en <strong>ReporteVentas<\u002Fstrong> (cálculo), <strong>ExportadorPDF<\u002Fstrong> y <strong>NotificadorEmail<\u002Fstrong>.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"background:#1a1d23;color:#eef0f2;border-radius:12px;padding:24px 32px;\">\n    <p style=\"font-size:26px;line-height:1.4;margin:0;\">Observá que arreglar OCP y LSP terminó, otra vez, en <strong style=\"color:oklch(0.72 0.13 258);\">interfaces + polimorfismo<\u002Fstrong>.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Cierre\" data-screen-label=\"36\" data-speaker-notes=\"Hoy vimos qué es SOLID y por qué existe, los 5 principios en formato antes→después con su olor, y que el hilo común es bajar el acoplamiento con interfaces y polimorfismo. Próxima: Patrones de diseño.\" style=\"height:100%;box-sizing:border-box;background:#1a1d23;color:#eef0f2;padding:80px 96px;display:flex;flex-direction:column;justify-content:center;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.18em;text-transform:uppercase;color:oklch(0.72 0.13 258);margin-bottom:18px;\">Cierre<\u002Fdiv>\n  <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:60px;font-weight:600;line-height:1.02;margin:0 0 44px;\">Lo que nos llevamos<\u002Fh2>\n  <div style=\"display:flex;flex-direction:column;gap:26px;max-width:1550px;margin-bottom:52px;\">\n    <p style=\"font-size:31px;line-height:1.4;margin:0;padding-left:36px;position:relative;\"><span style=\"position:absolute;left:0;color:oklch(0.72 0.13 258);\">→<\u002Fspan>Qué es <strong>SOLID<\u002Fstrong> y por qué existe: pelear contra el código <strong>rígido, frágil e inmóvil<\u002Fstrong>.<\u002Fp>\n    <p style=\"font-size:31px;line-height:1.4;margin:0;padding-left:36px;position:relative;\"><span style=\"position:absolute;left:0;color:oklch(0.72 0.13 258);\">→<\u002Fspan>Los <strong>5 principios<\u002Fstrong>, cada uno en formato <strong>antes → después<\u002Fstrong> con su \"olor a código\".<\u002Fp>\n    <p style=\"font-size:31px;line-height:1.4;margin:0;padding-left:36px;position:relative;\"><span style=\"position:absolute;left:0;color:oklch(0.72 0.13 258);\">→<\u002Fspan>El hilo común: <strong>bajar el acoplamiento<\u002Fstrong> apoyándose en <strong>interfaces y polimorfismo<\u002Fstrong>.<\u002Fp>\n  <\u002Fdiv>\n  <div style=\"border-left:3px solid oklch(0.72 0.13 258);padding-left:30px;max-width:1550px;\">\n    <p style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.1em;text-transform:uppercase;color:#8a90a0;margin:0 0 10px;\">Próxima clase<\u002Fp>\n    <p style=\"font-size:32px;line-height:1.4;margin:0;\"><strong>Patrones de diseño<\u002Fstrong> (Unidad 4) — soluciones ya probadas a problemas que se repiten. SOLID es el <em>por qué<\u002Fem>; los patrones son el <em>cómo<\u002Fem> concreto.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Ficha resumen\" data-screen-label=\"37\" data-speaker-notes=\"Guardá esto: definición + el olor que delata la violación. Cura recurrente: una interfaz + polimorfismo + inyección por constructor.\" style=\"height:100%;box-sizing:border-box;background:#f4f1ea;color:#23262c;padding:56px 80px;display:flex;flex-direction:column;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.14em;text-transform:uppercase;color:oklch(0.55 0.14 258);margin-bottom:12px;\">Ficha resumen · guardá esto<\u002Fdiv>\n  <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:46px;font-weight:600;margin:0 0 24px;\">Definición + el olor que la delata<\u002Fh2>\n  <table style=\"width:100%;border-collapse:collapse;font-size:22px;flex:1;\">\n    <thead>\n      <tr style=\"text-align:left;\">\n        <th style=\"padding:12px 16px;background:#1a1d23;color:#eef0f2;border-radius:8px 0 0 0;width:60px;\">·<\u002Fth>\n        <th style=\"padding:12px 16px;background:#1a1d23;color:#eef0f2;\">En una frase<\u002Fth>\n        <th style=\"padding:12px 16px;background:#1a1d23;color:#eef0f2;border-radius:0 8px 0 0;\">Olor que lo delata<\u002Fth>\n      <\u002Ftr>\n    <\u002Fthead>\n    <tbody>\n      <tr style=\"border-bottom:1px solid #e0d9ca;\">\n        <td style=\"padding:16px;font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:700;color:oklch(0.58 0.13 258);\">S<\u002Ftd>\n        <td style=\"padding:16px;line-height:1.35;\">Una clase, una razón para cambiar<\u002Ftd>\n        <td style=\"padding:16px;line-height:1.35;color:#4a4f59;\">Describís la clase con un \"y\"; mezcla lógica + persistencia + UI<\u002Ftd>\n      <\u002Ftr>\n      <tr style=\"border-bottom:1px solid #e0d9ca;\">\n        <td style=\"padding:16px;font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:700;color:oklch(0.56 0.13 155);\">O<\u002Ftd>\n        <td style=\"padding:16px;line-height:1.35;\">Extender sin modificar lo existente<\u002Ftd>\n        <td style=\"padding:16px;line-height:1.35;color:#4a4f59;\"><code style=\"font-family:'IBM Plex Mono',monospace;\">if/switch<\u002Fcode> sobre un \"tipo\" que crece; editás la misma clase por cada feature<\u002Ftd>\n      <\u002Ftr>\n      <tr style=\"border-bottom:1px solid #e0d9ca;\">\n        <td style=\"padding:16px;font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:700;color:oklch(0.63 0.13 70);\">L<\u002Ftd>\n        <td style=\"padding:16px;line-height:1.35;\">El hijo no rompe las promesas del padre<\u002Ftd>\n        <td style=\"padding:16px;line-height:1.35;color:#4a4f59;\">Métodos que tiran error o quedan vacíos; el cliente usa <code style=\"font-family:'IBM Plex Mono',monospace;\">instanceof<\u002Fcode><\u002Ftd>\n      <\u002Ftr>\n      <tr style=\"border-bottom:1px solid #e0d9ca;\">\n        <td style=\"padding:16px;font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:700;color:oklch(0.58 0.13 25);\">I<\u002Ftd>\n        <td style=\"padding:16px;line-height:1.35;\">Interfaces chicas y específicas<\u002Ftd>\n        <td style=\"padding:16px;line-height:1.35;color:#4a4f59;\">Clases con métodos vacíos o <code style=\"font-family:'IBM Plex Mono',monospace;\">throw \"not supported\"<\u002Fcode>; interfaces enormes<\u002Ftd>\n      <\u002Ftr>\n      <tr>\n        <td style=\"padding:16px;font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:700;color:oklch(0.55 0.13 310);\">D<\u002Ftd>\n        <td style=\"padding:16px;line-height:1.35;\">Depender de abstracciones, inyectar lo concreto<\u002Ftd>\n        <td style=\"padding:16px;line-height:1.35;color:#4a4f59;\"><code style=\"font-family:'IBM Plex Mono',monospace;\">new<\u002Fcode> de clases concretas adentro; imposible mockear para testear<\u002Ftd>\n      <\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n  <div style=\"background:#1a1d23;color:#eef0f2;border-radius:12px;padding:20px 30px;margin-top:20px;\">\n    <p style=\"font-size:25px;line-height:1.4;margin:0;\"><strong>Cura recurrente:<\u002Fstrong> casi todo se arregla con <strong style=\"color:oklch(0.72 0.13 258);\">una interfaz + polimorfismo + inyección por constructor<\u002Fstrong>.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Ejercicios\" data-screen-label=\"38\" data-speaker-notes=\"Para cada uno: identificá el principio violado y reescribí el código o el diagrama corregido. Traé los 5 resueltos para revisarlos al inicio de la próxima clase.\" style=\"height:100%;box-sizing:border-box;background:#f4f1ea;color:#23262c;padding:56px 96px;display:flex;flex-direction:column;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.14em;text-transform:uppercase;color:oklch(0.55 0.14 258);margin-bottom:12px;\">Después de clase<\u002Fdiv>\n  <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:48px;font-weight:600;margin:0 0 12px;\">Ejercicios<\u002Fh2>\n  <p style=\"font-size:24px;line-height:1.4;margin:0 0 28px;color:#4a4f59;\">Para cada uno: identificá el principio violado y reescribí el código (o el diagrama) corregido.<\u002Fp>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px 56px;flex:1;\">\n    <div style=\"display:flex;gap:20px;align-items:baseline;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:700;color:oklch(0.55 0.14 258);\">1<\u002Fspan><p style=\"font-size:24px;line-height:1.4;margin:0;\"><code style=\"font-family:'IBM Plex Mono',monospace;background:#e9e2d4;padding:1px 6px;border-radius:4px;\">Voluntario extends Empleado<\u002Fcode> cuyo <code style=\"font-family:'IBM Plex Mono',monospace;\">calcularSalario()<\u002Fcode> hace <code style=\"font-family:'IBM Plex Mono',monospace;\">throw \"no cobra\"<\u002Fcode>. Reordená la jerarquía.<\u002Fp><\u002Fdiv>\n    <div style=\"display:flex;gap:20px;align-items:baseline;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:700;color:oklch(0.55 0.14 258);\">2<\u002Fspan><p style=\"font-size:24px;line-height:1.4;margin:0;\"><code style=\"font-family:'IBM Plex Mono',monospace;background:#e9e2d4;padding:1px 6px;border-radius:4px;\">NotificadorPedidos<\u002Fcode> crea adentro <code style=\"font-family:'IBM Plex Mono',monospace;\">new GmailSender()<\u002Fcode>. Querés mandar por SMS y, en tests, no mandar nada.<\u002Fp><\u002Fdiv>\n    <div style=\"display:flex;gap:20px;align-items:baseline;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:700;color:oklch(0.55 0.14 258);\">3<\u002Fspan><p style=\"font-size:24px;line-height:1.4;margin:0;\">Interfaz <code style=\"font-family:'IBM Plex Mono',monospace;background:#e9e2d4;padding:1px 6px;border-radius:4px;\">ITrabajador<\u002Fcode> con <code style=\"font-family:'IBM Plex Mono',monospace;\">trabajar()<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">comer()<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">dormir()<\u002Fcode>. Un <code style=\"font-family:'IBM Plex Mono',monospace;\">RobotObrero<\u002Fcode> no come ni duerme.<\u002Fp><\u002Fdiv>\n    <div style=\"display:flex;gap:20px;align-items:baseline;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:700;color:oklch(0.55 0.14 258);\">4<\u002Fspan><p style=\"font-size:24px;line-height:1.4;margin:0;\"><code style=\"font-family:'IBM Plex Mono',monospace;background:#e9e2d4;padding:1px 6px;border-radius:4px;\">ProcesadorPago<\u002Fcode> tiene <code style=\"font-family:'IBM Plex Mono',monospace;\">procesar(metodo)<\u002Fcode> con un <code style=\"font-family:'IBM Plex Mono',monospace;\">switch<\u002Fcode>. Mañana entra <code style=\"font-family:'IBM Plex Mono',monospace;\">\"cripto\"<\u002Fcode>.<\u002Fp><\u002Fdiv>\n    <div style=\"display:flex;gap:20px;align-items:baseline;grid-column:1 / -1;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:700;color:oklch(0.55 0.14 258);\">5<\u002Fspan><p style=\"font-size:24px;line-height:1.4;margin:0;max-width:1400px;\"><code style=\"font-family:'IBM Plex Mono',monospace;background:#e9e2d4;padding:1px 6px;border-radius:4px;\">GestorUsuario<\u002Fcode> tiene <code style=\"font-family:'IBM Plex Mono',monospace;\">guardarEnBaseDeDatos()<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;\">validarEmail()<\u002Fcode> y <code style=\"font-family:'IBM Plex Mono',monospace;\">renderizarPerfilHTML()<\u002Fcode>. ¿Qué principio rompe y cómo lo partís?<\u002Fp><\u002Fdiv>\n  <\u002Fdiv>\n  <p style=\"font-size:23px;line-height:1.4;margin:16px 0 0;color:#6b6f78;font-style:italic;\">Traé los 5 resueltos (código o diagrama) para revisarlos al inicio de la próxima clase.<\u002Fp>\n<\u002Fsection>\n\n<section data-label=\"Casos para razonar\" data-screen-label=\"39\" data-speaker-notes=\"No son de mirar código y listo: son situaciones contadas en palabras, como un enunciado de parcial. Para cada uno respondé por escrito: qué principio(s), qué síntoma exacto lo delata, cómo lo rediseñás.\" style=\"height:100%;box-sizing:border-box;background:#1a1d23;color:#eef0f2;padding:80px 96px;display:flex;flex-direction:column;justify-content:center;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.18em;text-transform:uppercase;color:oklch(0.72 0.13 258);margin-bottom:18px;\">Después de clase<\u002Fdiv>\n  <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:58px;font-weight:600;line-height:1.02;margin:0 0 30px;\">Casos para razonar<\u002Fh2>\n  <p style=\"font-size:30px;line-height:1.45;margin:0 0 48px;max-width:1550px;color:#c5cad4;\">No son de \"mirar código y listo\": son <strong style=\"color:#eef0f2;\">situaciones contadas en palabras<\u002Fstrong>, como te las plantearía un enunciado de parcial. Para cada uno, respondé por escrito:<\u002Fp>\n  <div style=\"display:flex;gap:56px;\">\n    <div style=\"max-width:440px;\"><p style=\"font-family:'Space Grotesk',sans-serif;font-size:36px;font-weight:700;color:oklch(0.72 0.13 258);margin:0 0 8px;\">01<\u002Fp><p style=\"font-size:27px;line-height:1.4;margin:0;\">¿Qué principio(s) se viola(n)? (puede ser <strong>más de uno<\u002Fstrong>)<\u002Fp><\u002Fdiv>\n    <div style=\"max-width:440px;\"><p style=\"font-family:'Space Grotesk',sans-serif;font-size:36px;font-weight:700;color:oklch(0.72 0.13 258);margin:0 0 8px;\">02<\u002Fp><p style=\"font-size:27px;line-height:1.4;margin:0;\">¿Cuál es la <strong>frase o síntoma<\u002Fstrong> exacto del texto que te lo delata?<\u002Fp><\u002Fdiv>\n    <div style=\"max-width:440px;\"><p style=\"font-family:'Space Grotesk',sans-serif;font-size:36px;font-weight:700;color:oklch(0.72 0.13 258);margin:0 0 8px;\">03<\u002Fp><p style=\"font-size:27px;line-height:1.4;margin:0;\">¿Cómo lo rediseñarías? (nombrá clases/interfaces nuevas)<\u002Fp><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Caso 1 — facturación\" data-screen-label=\"40\" data-speaker-notes=\"Facturación: switch por país que crece y rompe Argentina; además imprimirEnPDF y enviarPorEmail en la misma clase. Hay violaciones distintas conviviendo (OCP y SRP): encontralas por separado.\" style=\"height:100%;box-sizing:border-box;background:#f4f1ea;color:#23262c;padding:64px 96px;display:flex;flex-direction:column;justify-content:center;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"display:flex;align-items:baseline;gap:22px;margin-bottom:28px;\">\n    <span style=\"font-family:'Space Grotesk',sans-serif;font-size:60px;font-weight:700;color:oklch(0.55 0.14 258);\">01<\u002Fspan>\n    <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:48px;font-weight:600;margin:0;\">El sistema de facturación<\u002Fh2>\n  <\u002Fdiv>\n  <div style=\"background:#fff;border:1px solid #e4ddcf;border-radius:16px;padding:40px 48px;max-width:1650px;\">\n    <p style=\"font-size:29px;line-height:1.6;margin:0;color:#33373f;\">Una clase <code style=\"font-family:'IBM Plex Mono',monospace;background:#f0e9db;padding:2px 8px;border-radius:5px;\">Factura<\u002Fcode> guarda los datos (cliente, ítems, total) y además tiene <code style=\"font-family:'IBM Plex Mono',monospace;background:#f0e9db;padding:2px 8px;border-radius:5px;\">calcularImpuestos()<\u002Fcode> con un <code style=\"font-family:'IBM Plex Mono',monospace;background:#f0e9db;padding:2px 8px;border-radius:5px;\">switch<\u002Fcode> por país (Argentina 21%, Uruguay otro, Chile otro). Cada país nuevo, un programador abre <strong>Factura<\u002Fstrong>, agrega un <code style=\"font-family:'IBM Plex Mono',monospace;background:#f0e9db;padding:2px 8px;border-radius:5px;\">case<\u002Fcode> y recompila — la última vez rompieron sin querer el cálculo de Argentina y facturaron mal dos días. Ah, y <strong>Factura<\u002Fstrong> <strong>también<\u002Fstrong> tiene <code style=\"font-family:'IBM Plex Mono',monospace;background:#f0e9db;padding:2px 8px;border-radius:5px;\">imprimirEnPDF()<\u002Fcode> y <code style=\"font-family:'IBM Plex Mono',monospace;background:#f0e9db;padding:2px 8px;border-radius:5px;\">enviarPorEmailAlCliente()<\u002Fcode>.<\u002Fp>\n  <\u002Fdiv>\n  <p style=\"font-size:26px;line-height:1.45;margin:32px 0 0;color:#4a4f59;max-width:1650px;\">Hay violaciones <strong>distintas<\u002Fstrong> conviviendo. Encontralas por separado y explicá por qué cada síntoma corresponde a un principio y no al otro.<\u002Fp>\n<\u002Fsection>\n\n\n\n<section data-label=\"Caso 3 — notificaciones\" data-screen-label=\"42\" data-speaker-notes=\"Notificaciones: ProcesadorDePedidos hace new SendGridMailer() adentro. (a) quieren WhatsApp, (b) testing no puede probar sin mandar mails, (c) cambiar de proveedor toca 15 clases. Es DIP. El mismo rediseño resuelve los tres.\" style=\"height:100%;box-sizing:border-box;background:#f4f1ea;color:#23262c;padding:56px 96px;display:flex;flex-direction:column;justify-content:center;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"display:flex;align-items:baseline;gap:22px;margin-bottom:24px;\">\n    <span style=\"font-family:'Space Grotesk',sans-serif;font-size:60px;font-weight:700;color:oklch(0.55 0.14 258);\">03<\u002Fspan>\n    <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:48px;font-weight:600;margin:0;\">El servicio de notificaciones<\u002Fh2>\n  <\u002Fdiv>\n  <div style=\"background:#fff;border:1px solid #e4ddcf;border-radius:16px;padding:34px 44px;max-width:1680px;\">\n    <p style=\"font-size:27px;line-height:1.55;margin:0 0 16px;color:#33373f;\"><code style=\"font-family:'IBM Plex Mono',monospace;background:#f0e9db;padding:2px 8px;border-radius:5px;\">ProcesadorDePedidos<\u002Fcode>, al confirmar un pedido, hace directamente <code style=\"font-family:'IBM Plex Mono',monospace;background:#f0e9db;padding:2px 8px;border-radius:5px;\">new SendGridMailer()<\u002Fcode> y luego <code style=\"font-family:'IBM Plex Mono',monospace;background:#f0e9db;padding:2px 8px;border-radius:5px;\">mailer.enviarMail(...)<\u002Fcode>. Aparecen tres pedidos del negocio:<\u002Fp>\n    <div style=\"display:flex;flex-direction:column;gap:10px;\">\n      <p style=\"font-size:25px;line-height:1.4;margin:0;\"><strong style=\"color:oklch(0.5 0.14 258);\">(a)<\u002Fstrong> algunos clientes quieren aviso por <strong>WhatsApp<\u002Fstrong> además del mail.<\u002Fp>\n      <p style=\"font-size:25px;line-height:1.4;margin:0;\"><strong style=\"color:oklch(0.5 0.14 258);\">(b)<\u002Fstrong> testing <strong>no puede probar<\u002Fstrong> sin que se manden mails de verdad.<\u002Fp>\n      <p style=\"font-size:25px;line-height:1.4;margin:0;\"><strong style=\"color:oklch(0.5 0.14 258);\">(c)<\u002Fstrong> marketing cambia de proveedor: habría que tocar <strong>~15 clases<\u002Fstrong> con <code style=\"font-family:'IBM Plex Mono',monospace;background:#f0e9db;padding:2px 8px;border-radius:5px;\">new SendGridMailer()<\u002Fcode> desperdigadas.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <p style=\"font-size:25px;line-height:1.45;margin:26px 0 0;color:#4a4f59;max-width:1680px;\">Nombrá el principio central y explicá, punto por punto, cómo <strong>el mismo rediseño<\u002Fstrong> resuelve los tres. ¿Qué abstracción falta y quién debería decidir la implementación concreta?<\u002Fp>\n<\u002Fsection><section data-label=\"Caso 2 — cuentas bancarias\" data-screen-label=\"41\" data-speaker-notes=\"Cuentas bancarias: PlazoFijo hereda de CuentaBancaria pero extraer() tira error, y el código que hace cuenta.extraer() explota. Es LSP. ¿Qué promesa rompió? Proponé jerarquía sin llenar de instanceof.\" style=\"height:100%;box-sizing:border-box;background:#f4f1ea;color:#23262c;padding:64px 96px;display:flex;flex-direction:column;justify-content:center;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"display:flex;align-items:baseline;gap:22px;margin-bottom:28px;\">\n    <span style=\"font-family:'Space Grotesk',sans-serif;font-size:60px;font-weight:700;color:oklch(0.55 0.14 258);\">02<\u002Fspan>\n    <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:48px;font-weight:600;margin:0;\">La jerarquía de cuentas bancarias<\u002Fh2>\n  <\u002Fdiv>\n  <div style=\"background:#fff;border:1px solid #e4ddcf;border-radius:16px;padding:40px 48px;max-width:1650px;\">\n    <p style=\"font-size:29px;line-height:1.6;margin:0;color:#33373f;\">Una clase base <code style=\"font-family:'IBM Plex Mono',monospace;background:#f0e9db;padding:2px 8px;border-radius:5px;\">CuentaBancaria<\u002Fcode> tiene <code style=\"font-family:'IBM Plex Mono',monospace;background:#f0e9db;padding:2px 8px;border-radius:5px;\">depositar(monto)<\u002Fcode> y <code style=\"font-family:'IBM Plex Mono',monospace;background:#f0e9db;padding:2px 8px;border-radius:5px;\">extraer(monto)<\u002Fcode>. Muchas partes del sistema reciben una <strong>CuentaBancaria<\u002Fstrong> cualquiera y hacen <code style=\"font-family:'IBM Plex Mono',monospace;background:#f0e9db;padding:2px 8px;border-radius:5px;\">cuenta.extraer(1000)<\u002Fcode> sin preguntar el tipo. Después agregan <code style=\"font-family:'IBM Plex Mono',monospace;background:#f0e9db;padding:2px 8px;border-radius:5px;\">PlazoFijo<\u002Fcode>, que también hereda \"porque total, es una cuenta\". Pero un plazo fijo no se toca hasta el vencimiento, así que su <code style=\"font-family:'IBM Plex Mono',monospace;background:#f0e9db;padding:2px 8px;border-radius:5px;\">extraer()<\u002Fcode> quedó como <code style=\"font-family:'IBM Plex Mono',monospace;background:#f0e9db;padding:2px 8px;border-radius:5px;\">throw \"no se puede extraer\"<\u002Fcode>. Desde entonces, cada tanto una pantalla <strong>explota<\u002Fstrong> cuando un plazo fijo pasa por ese código.<\u002Fp>\n  <\u002Fdiv>\n  <p style=\"font-size:26px;line-height:1.45;margin:32px 0 0;color:#4a4f59;max-width:1650px;\">Explicá <strong>qué promesa<\u002Fstrong> rompió <strong>PlazoFijo<\u002Fstrong> y proponé una jerarquía (o interfaces) que lo arregle sin llenar el código de <code style=\"font-family:'IBM Plex Mono',monospace;background:#e9e2d4;padding:2px 6px;border-radius:5px;\">if (cuenta instanceof PlazoFijo)<\u002Fcode>.<\u002Fp>\n<\u002Fsection>\n\n<section data-label=\"Lectura recomendada\" data-screen-label=\"43\" data-speaker-notes=\"Refactoring Guru (SOLID en español), Clean Code / Clean Architecture de Uncle Bob. Repasá la Clase 1: interfaces, abstractas y polimorfismo. Consejo de parcial: no memorices siglas, aprendé a oler la violación.\" style=\"height:100%;box-sizing:border-box;background:#1a1d23;color:#eef0f2;padding:80px 96px;display:flex;flex-direction:column;justify-content:center;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.18em;text-transform:uppercase;color:oklch(0.72 0.13 258);margin-bottom:18px;\">Después de clase<\u002Fdiv>\n  <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:56px;font-weight:600;line-height:1.02;margin:0 0 44px;\">Lectura recomendada<\u002Fh2>\n  <div style=\"display:flex;flex-direction:column;gap:26px;max-width:1600px;margin-bottom:48px;\">\n    <p style=\"font-size:29px;line-height:1.45;margin:0;padding-left:36px;position:relative;\"><span style=\"position:absolute;left:0;color:oklch(0.72 0.13 258);\">→<\u002Fspan><strong>Refactoring Guru — SOLID Principles<\u002Fstrong> (en español): cada principio con ejemplos. <span style=\"font-family:'IBM Plex Mono',monospace;color:#8a90a0;\">refactoring.guru/es<\u002Fspan><\u002Fp>\n    <p style=\"font-size:29px;line-height:1.45;margin:0;padding-left:36px;position:relative;\"><span style=\"position:absolute;left:0;color:oklch(0.72 0.13 258);\">→<\u002Fspan><strong>Robert C. Martin — Clean Code / Clean Architecture<\u002Fstrong>, si querés ir a la fuente.<\u002Fp>\n    <p style=\"font-size:29px;line-height:1.45;margin:0;padding-left:36px;position:relative;\"><span style=\"position:absolute;left:0;color:oklch(0.72 0.13 258);\">→<\u002Fspan>Repasá la <strong>Clase 1<\u002Fstrong>: SOLID se apoya en interfaces, clases abstractas y polimorfismo.<\u002Fp>\n  <\u002Fdiv>\n  <div style=\"border-left:3px solid oklch(0.72 0.13 258);padding-left:30px;max-width:1600px;\">\n    <p style=\"font-size:28px;line-height:1.45;margin:0;color:#d5dae3;\"><strong style=\"color:#fff;\">Consejo para el parcial:<\u002Fstrong> no memorices las siglas sueltas. Aprendé a <strong style=\"color:#fff;\">oler la violación<\u002Fstrong> en un código o diagrama y a nombrar el principio.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!--END-->\n<\u002Fx-import>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() { this._hl(); }\n  _hl() {\n    if (this._hlStarted) return;\n    this._hlStarted = true;\n    let n = 0;\n    const t = setInterval(() => {\n      n++;\n      if (window.hljs) {\n        document.querySelectorAll('pre code:not([data-hl])').forEach((b) => {\n          try { window.hljs.highlightElement(b); } catch (e) {}\n          b.setAttribute('data-hl', '1');\n        });\n      }\n      if (n > 40) clearInterval(t);\n    }, 150);\n  }\n  renderVals() { return {}; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
