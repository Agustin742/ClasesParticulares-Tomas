  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

15, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>pre code.hljs{display:block;overflow-x:auto;padding:1em}code.hljs{padding:3px 5px}.hljs{color:#abb2bf;background:#282c34}.hljs-comment,.hljs-quote{color:#5c6370;font-style:italic}.hljs-doctag,.hljs-formula,.hljs-keyword{color:#c678dd}.hljs-deletion,.hljs-name,.hljs-section,.hljs-selector-tag,.hljs-subst{color:#e06c75}.hljs-literal{color:#56b6c2}.hljs-addition,.hljs-attribute,.hljs-meta .hljs-string,.hljs-regexp,.hljs-string{color:#98c379}.hljs-attr,.hljs-number,.hljs-selector-attr,.hljs-selector-class,.hljs-selector-pseudo,.hljs-template-variable,.hljs-type,.hljs-variable{color:#d19a66}.hljs-bullet,.hljs-link,.hljs-meta,.hljs-selector-id,.hljs-symbol,.hljs-title{color:#61aeee}.hljs-built_in,.hljs-class .hljs-title,.hljs-title.class_{color:#e6c07b}.hljs-emphasis{font-style:italic}.hljs-strong{font-weight:700}.hljs-link{text-decoration:underline}<\u002Fstyle>\n<script src=\"7976640a-7cf6-4aeb-bfa0-a3a9b4a232bb\"><\u002Fscript>\n<style>\n  html,body{margin:0;padding:0;background:#0f1114;}\n  a{color:oklch(0.6 0.14 258);} a:hover{color:oklch(0.68 0.14 258);}\n  pre{margin:0;}\n  pre code.hljs{background:transparent!important;padding:0!important;font-family:'IBM Plex Mono',monospace;white-space:pre-wrap!important;overflow-wrap:break-word;word-break:break-word;}\n  .cd{background:#282c34;border:1px solid #3a3f4b;border-radius:14px;padding:26px 30px;overflow:hidden;box-shadow:0 14px 40px rgba(0,0,0,0.18);}\n  .cd pre{font-family:'IBM Plex Mono',monospace;color:#dfe3ea;font-size:26px;line-height:1.55;white-space:pre-wrap;overflow-wrap:break-word;}\n  .cd code{font-family:'IBM Plex Mono',monospace;color:#dfe3ea;font-size:inherit;line-height:inherit;white-space:pre-wrap;overflow-wrap:break-word;}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<x-import component-from-global-scope=\"deck-stage\" from=\"dcfd3ec7-e598-49a8-8c84-e27f27048fd7#/deck-stage.js\" width=\"1920\" height=\"1080\" hint-size=\"100%,100%\" data-uneditable=\"\">\n\n<section data-label=\"Portada\" data-screen-label=\"01\" data-speaker-notes=\"En la Clase 1 vimos cómo se arma la POO. Hoy: cómo se arma BIEN. 5 principios de diseño. Uncle Bob, principios de los 2000.\" style=\"height:100%;box-sizing:border-box;background:#1a1d23;color:#eef0f2;padding:92px 110px;display:flex;flex-direction:column;justify-content:space-between;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:baseline;font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.18em;text-transform:uppercase;color:#8a90a0;\">\n    <span>Programación II · Unidad 2<\u002Fspan><span>Ejemplos en TypeScript<\u002Fspan>\n  <\u002Fdiv>\n  <div>\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:26px;letter-spacing:0.24em;color:oklch(0.72 0.13 258);margin-bottom:22px;\">CLASE 2<\u002Fdiv>\n    <h1 style=\"font-family:'Space Grotesk',sans-serif;font-size:148px;font-weight:700;line-height:0.96;margin:0;letter-spacing:-0.02em;\">Principios<br>S.O.L.I.D.<\u002Fh1>\n    <p style=\"font-size:32px;line-height:1.45;margin:34px 0 0;max-width:1150px;color:#c5cad4;\">En la Clase 1 vimos <strong style=\"color:#eef0f2;\">cómo<\u002Fstrong> se arma la POO. Hoy vemos <strong style=\"color:#eef0f2;\">cómo se arma bien<\u002Fstrong>: cinco principios para que el código no se vuelva un plato de fideos.<\u002Fp>\n  <\u002Fdiv>\n  <div style=\"border-left:3px solid oklch(0.72 0.13 258);padding-left:30px;max-width:1200px;\">\n    <p style=\"font-size:30px;line-height:1.4;font-style:italic;margin:0 0 12px;color:#d5dae3;\">\"Cualquiera puede escribir código que una computadora entienda. Los buenos programadores escriben código que los humanos pueden entender.\"<\u002Fp>\n    <p style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;margin:0;color:#8a90a0;\">— Martin Fowler<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Qué es SOLID\" data-screen-label=\"02\" data-speaker-notes=\"5 principios de diseño. Robert C. Martin los enunció; Michael Feathers armó el acrónimo. No son reglas mágicas: son guías. Meta única: bajar el acoplamiento.\" style=\"height:100%;box-sizing:border-box;background:#f4f1ea;color:#23262c;padding:72px 96px;display:flex;flex-direction:column;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.18em;text-transform:uppercase;color:oklch(0.55 0.14 258);margin-bottom:14px;\">Introducción<\u002Fdiv>\n  <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:64px;font-weight:600;line-height:1.02;margin:0 0 40px;\">¿Qué es SOLID?<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:0.9fr 1.1fr;gap:64px;align-items:start;flex:1;\">\n    <div>\n      <p style=\"font-size:32px;line-height:1.5;margin:0 0 28px;\">Son <strong>5 principios de diseño<\u002Fstrong> para escribir clases más mantenibles.<\u002Fp>\n      <p style=\"font-size:28px;line-height:1.5;margin:0 0 28px;color:#4a4f59;\">Los enunció <strong>Robert C. Martin<\u002Fstrong> (\"Uncle Bob\") a principios de los 2000; <strong>Michael Feathers<\u002Fstrong> les dio el acrónimo <strong>SOLID<\u002Fstrong>.<\u002Fp>\n      <div style=\"border-left:3px solid oklch(0.55 0.14 258);padding-left:24px;margin-top:36px;\">\n        <p style=\"font-size:27px;line-height:1.5;margin:0;color:#33373f;\">No son reglas mágicas ni obligatorias: son <strong>guías<\u002Fstrong>. La meta de todas es la misma → <strong>bajar el acoplamiento<\u002Fstrong> y que un cambio no rompa media aplicación.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:16px;\">\n      <div style=\"display:flex;align-items:center;gap:26px;background:#fff;border:1px solid #e4ddcf;border-radius:12px;padding:18px 28px;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:52px;font-weight:700;color:oklch(0.58 0.13 258);width:52px;\">S<\u002Fspan><span style=\"font-size:29px;\">Single Responsibility · <span style=\"color:#6b6f78;\">Responsabilidad única<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:26px;background:#fff;border:1px solid #e4ddcf;border-radius:12px;padding:18px 28px;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:52px;font-weight:700;color:oklch(0.56 0.13 155);width:52px;\">O<\u002Fspan><span style=\"font-size:29px;\">Open/Closed · <span style=\"color:#6b6f78;\">Abierto/Cerrado<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:26px;background:#fff;border:1px solid #e4ddcf;border-radius:12px;padding:18px 28px;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:52px;font-weight:700;color:oklch(0.63 0.13 70);width:52px;\">L<\u002Fspan><span style=\"font-size:29px;\">Liskov Substitution · <span style=\"color:#6b6f78;\">Sustitución de Liskov<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:26px;background:#fff;border:1px solid #e4ddcf;border-radius:12px;padding:18px 28px;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:52px;font-weight:700;color:oklch(0.58 0.13 25);width:52px;\">I<\u002Fspan><span style=\"font-size:29px;\">Interface Segregation · <span style=\"color:#6b6f78;\">Segregación de interfaces<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:26px;background:#fff;border:1px solid #e4ddcf;border-radius:12px;padding:18px 28px;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:52px;font-weight:700;color:oklch(0.55 0.13 310);width:52px;\">D<\u002Fspan><span style=\"font-size:29px;\">Dependency Inversion · <span style=\"color:#6b6f78;\">Inversión de dependencias<\u002Fspan><\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Por qué importa\" data-screen-label=\"03\" data-speaker-notes=\"Código sin estos principios: rígido, frágil, inmóvil. SOLID busca mantenibilidad, escalabilidad, reusabilidad. Regla mental: una clase, una razón para cambiar.\" style=\"height:100%;box-sizing:border-box;background:#f4f1ea;color:#23262c;padding:72px 96px;display:flex;flex-direction:column;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.18em;text-transform:uppercase;color:oklch(0.55 0.14 258);margin-bottom:14px;\">Introducción<\u002Fdiv>\n  <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:60px;font-weight:600;line-height:1.02;margin:0 0 40px;\">¿Por qué me deberían importar?<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:56px;flex:1;\">\n    <div>\n      <p style=\"font-size:26px;text-transform:uppercase;letter-spacing:0.1em;color:oklch(0.58 0.13 25);font-weight:600;margin:0 0 22px;\">Los 3 olores del código malo<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:20px;\">\n        <div><p style=\"font-size:30px;font-weight:600;margin:0 0 4px;\">Rígido<\u002Fp><p style=\"font-size:26px;line-height:1.4;margin:0;color:#4a4f59;\">Para un cambio chico tengo que tocar diez lugares.<\u002Fp><\u002Fdiv>\n        <div><p style=\"font-size:30px;font-weight:600;margin:0 0 4px;\">Frágil<\u002Fp><p style=\"font-size:26px;line-height:1.4;margin:0;color:#4a4f59;\">Toco acá y se rompe algo allá, sin relación aparente.<\u002Fp><\u002Fdiv>\n        <div><p style=\"font-size:30px;font-weight:600;margin:0 0 4px;\">Inmóvil<\u002Fp><p style=\"font-size:26px;line-height:1.4;margin:0;color:#4a4f59;\">No puedo reutilizar una parte sin arrastrar todo lo demás.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <p style=\"font-size:26px;text-transform:uppercase;letter-spacing:0.1em;color:oklch(0.56 0.13 155);font-weight:600;margin:0 0 22px;\">Lo que SOLID busca<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:20px;\">\n        <div><p style=\"font-size:30px;font-weight:600;margin:0 0 4px;\">Mantenibilidad<\u002Fp><p style=\"font-size:26px;line-height:1.4;margin:0;color:#4a4f59;\">Encontrar y arreglar bugs sin efectos colaterales.<\u002Fp><\u002Fdiv>\n        <div><p style=\"font-size:30px;font-weight:600;margin:0 0 4px;\">Escalabilidad<\u002Fp><p style=\"font-size:26px;line-height:1.4;margin:0;color:#4a4f59;\">Agregar features sin reescribir lo que ya andaba.<\u002Fp><\u002Fdiv>\n        <div><p style=\"font-size:30px;font-weight:600;margin:0 0 4px;\">Reusabilidad<\u002Fp><p style=\"font-size:26px;line-height:1.4;margin:0;color:#4a4f59;\">Piezas chicas e independientes que puedo combinar.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"background:#1a1d23;color:#eef0f2;border-radius:12px;padding:26px 34px;margin-top:8px;\">\n    <p style=\"font-size:30px;line-height:1.4;margin:0;\">Regla mental para toda la clase: <strong style=\"color:oklch(0.72 0.13 258);\">una clase debería tener una sola razón para cambiar.<\u002Fstrong><\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Repaso polimorfismo\" data-screen-label=\"04\" data-speaker-notes=\"Mismo llamado, distinto comportamiento. Dos formas: por herencia (override) y por interfaces (mismo contrato). Clave: el que llama le habla a la abstracción.\" style=\"height:100%;box-sizing:border-box;background:#f4f1ea;color:#23262c;padding:72px 96px;display:flex;flex-direction:column;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.18em;text-transform:uppercase;color:oklch(0.55 0.14 258);margin-bottom:14px;\">Repaso relámpago<\u002Fdiv>\n  <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:64px;font-weight:600;line-height:1.02;margin:0 0 30px;\">Polimorfismo<\u002Fh2>\n  <p style=\"font-size:34px;line-height:1.45;margin:0 0 42px;max-width:1500px;\"><strong>Mismo llamado, distinto comportamiento.<\u002Fstrong> Objetos diferentes responden al mismo método, cada uno a su manera. Hoy es <strong>la herramienta que resuelve casi todo SOLID<\u002Fstrong>.<\u002Fp>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:36px;\">\n    <div style=\"background:#fff;border:1px solid #e4ddcf;border-radius:14px;padding:32px 36px;\">\n      <p style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;color:oklch(0.55 0.14 258);margin:0 0 12px;\">por herencia<\u002Fp>\n      <p style=\"font-size:28px;line-height:1.5;margin:0;color:#33373f;\">Una subclase <strong>sobreescribe<\u002Fstrong> un método del padre.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border:1px solid #e4ddcf;border-radius:14px;padding:32px 36px;\">\n      <p style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;color:oklch(0.55 0.14 258);margin:0 0 12px;\">por interfaces<\u002Fp>\n      <p style=\"font-size:28px;line-height:1.5;margin:0;color:#33373f;\">Clases de naturaleza distinta implementan el <strong>mismo contrato<\u002Fstrong>.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <p style=\"font-size:30px;line-height:1.5;margin:44px 0 0;max-width:1550px;color:#33373f;\">La clave: el código que <strong>llama<\u002Fstrong> al método no necesita saber <em>quién<\u002Fem> es el objeto concreto. Le habla a la <strong>abstracción<\u002Fstrong> y cada objeto responde solo.<\u002Fp>\n<\u002Fsection>\n\n<section data-label=\"Polimorfismo ejemplo\" data-screen-label=\"05\" data-speaker-notes=\"cobrar() no tiene ni un if sobre el tipo. Agregar Cripto es sumar una clase que implemente Pago, sin tocar cobrar(). Acordate de esta sensación.\" style=\"height:100%;box-sizing:border-box;background:#f4f1ea;color:#23262c;padding:56px 72px;display:flex;flex-direction:column;font-family:'IBM Plex Sans',sans-serif;\">\n  <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:48px;font-weight:600;line-height:1.02;margin:0 0 24px;\">Polimorfismo — un ejemplo concreto<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:minmax(0,1.35fr) 560px;gap:44px;flex:1;min-height:0;align-items:center;\" data-comment-anchor=\"9a78303ba7-div\">\n    <div class=\"cd\" style=\"padding:22px 26px;\"><pre style=\"font-size:18px;line-height:1.5;\"><code class=\"language-typescript\" data-comment-anchor=\"781cda8f3c-code\">interface Pago {\n  pagar(monto: number): void;\n}\n\nclass Tarjeta implements Pago {\n  pagar(monto: number): void { console.log(`Pago $${monto} con tarjeta`); }\n}\nclass Efectivo implements Pago {\n  pagar(monto: number): void { console.log(`Pago $${monto} en efectivo`); }\n}\nclass Transferencia implements Pago {\n  pagar(monto: number): void { console.log(`Transfiero $${monto}`); }\n}\n\n// El cliente le habla a la ABSTRACCIÓN Pago, no a las clases concretas:\nfunction cobrar(medio: Pago, monto: number): void {\n  medio.pagar(monto);   // cada objeto responde a su manera\n}\n\ncobrar(new Tarjeta(), 1000);   // Pago $1000 con tarjeta\ncobrar(new Efectivo(), 500);   // Pago $500 en efectivo<\u002Fcode><\u002Fpre><\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;align-items:center;\">\n      <div style=\"background:#1a1d23;color:#eef0f2;border-radius:10px;padding:14px 24px;font-family:'IBM Plex Mono',monospace;font-size:22px;text-align:center;\">cobrar(medio: Pago)<\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:16px;color:#8a8577;margin:6px 0 2px;\">medio.pagar()<\u002Fdiv>\n      <div style=\"width:0;border-left:2px dashed #b7b1a3;height:22px;\"><\u002Fdiv>\n      <div style=\"color:#b7b1a3;font-size:22px;line-height:0.6;\">▽<\u002Fdiv>\n      <div style=\"background:#fff;border:2px solid #d8d2c4;border-radius:10px;overflow:hidden;text-align:center;min-width:170px;\">\n        <div style=\"background:#ece4d5;padding:6px 18px;border-bottom:2px solid #d8d2c4;\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:15px;font-style:italic;color:#8a8577;\">«interface»<\u002Fdiv><div style=\"font-family:'IBM Plex Mono',monospace;font-size:21px;font-weight:600;\">Pago<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:8px 18px;font-family:'IBM Plex Mono',monospace;font-size:16px;color:#4a4f59;\">pagar(monto)<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"color:#b7b1a3;font-size:22px;line-height:0.5;margin-top:4px;\">△<\u002Fdiv>\n      <div style=\"width:0;border-left:2px dashed #b7b1a3;height:16px;\"><\u002Fdiv>\n      <div style=\"width:80%;border-top:2px dashed #b7b1a3;height:0;\"><\u002Fdiv>\n      <div style=\"display:flex;gap:18px;justify-content:center;align-items:flex-start;\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;\"><div style=\"width:0;border-left:2px dashed #b7b1a3;height:18px;\"><\u002Fdiv><div style=\"background:#fff;border:2px solid #d8d2c4;border-radius:8px;padding:8px 12px;font-family:'IBM Plex Mono',monospace;font-size:17px;font-weight:600;\">Tarjeta<\u002Fdiv><div style=\"font-size:15px;color:#8a8577;margin-top:6px;\">con tarjeta<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;align-items:center;\"><div style=\"width:0;border-left:2px dashed #b7b1a3;height:18px;\"><\u002Fdiv><div style=\"background:#fff;border:2px solid #d8d2c4;border-radius:8px;padding:8px 12px;font-family:'IBM Plex Mono',monospace;font-size:17px;font-weight:600;\">Efectivo<\u002Fdiv><div style=\"font-size:15px;color:#8a8577;margin-top:6px;\">en efectivo<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;align-items:center;\"><div style=\"width:0;border-left:2px dashed #b7b1a3;height:18px;\"><\u002Fdiv><div style=\"background:#fff;border:2px solid #d8d2c4;border-radius:8px;padding:8px 12px;font-family:'IBM Plex Mono',monospace;font-size:17px;font-weight:600;\">Transferencia<\u002Fdiv><div style=\"font-size:15px;color:#8a8577;margin-top:6px;\">transferencia<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-size:20px;line-height:1.4;color:#6b6f78;text-align:center;margin:18px 8px 0;font-style:italic;\">cobrar() no sabe cuál es, solo sabe que es un Pago.<\u002Fp>\n      <p style=\"font-size:22px;line-height:1.5;margin:20px 0 0;color:#33373f;\" data-comment-anchor=\"578f57f5bd-p\">Fijate que <code style=\"font-family:'IBM Plex Mono',monospace;background:#e9e2d4;padding:2px 8px;border-radius:5px;\">cobrar()<\u002Fcode> no tiene ni un <code style=\"font-family:'IBM Plex Mono',monospace;background:#e9e2d4;padding:2px 8px;border-radius:5px;\">if<\u002Fcode> sobre el tipo de pago. Agregar <strong>Cripto<\u002Fstrong> es sumar una clase que implemente <strong>Pago<\u002Fstrong> — sin tocar <code style=\"font-family:'IBM Plex Mono',monospace;background:#e9e2d4;padding:2px 8px;border-radius:5px;\">cobrar()<\u002Fcode>.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"El hilo de la clase\" data-screen-label=\"06\" data-speaker-notes=\"El mismo truco reaparece en O, L, I, D. Si entendés polimorfismo, SOLID deja de ser 5 reglas sueltas y pasa a ser 5 usos del mismo martillo.\" style=\"height:100%;box-sizing:border-box;background:#1a1d23;color:#eef0f2;padding:72px 96px;display:flex;flex-direction:column;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.18em;text-transform:uppercase;color:oklch(0.72 0.13 258);margin-bottom:14px;\">El hilo conductor<\u002Fdiv>\n  <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:56px;font-weight:600;line-height:1.05;margin:0 0 20px;max-width:1500px;\">Hablarle a una abstracción y dejar que cada objeto responda solo<\u002Fh2>\n  <p style=\"font-size:30px;line-height:1.45;margin:0 0 40px;max-width:1500px;color:#c5cad4;\">Ese truco es lo que vas a ver reaparecer en casi todos los principios:<\u002Fp>\n  <div style=\"display:flex;flex-direction:column;gap:20px;flex:1;\">\n    <div style=\"display:flex;align-items:baseline;gap:26px;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:40px;font-weight:700;color:oklch(0.62 0.13 155);width:42px;\">O<\u002Fspan><p style=\"font-size:29px;line-height:1.4;margin:0;\">Abierto/Cerrado → agregar un <strong>Pago<\u002Fstrong> nuevo <strong>sin tocar<\u002Fstrong> el código que ya anda.<\u002Fp><\u002Fdiv>\n    <div style=\"display:flex;align-items:baseline;gap:26px;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:40px;font-weight:700;color:oklch(0.68 0.13 70);width:42px;\">L<\u002Fspan><p style=\"font-size:29px;line-height:1.4;margin:0;\">Liskov → poder reemplazar <strong>Pago<\u002Fstrong> por <strong>cualquier<\u002Fstrong> implementación sin que se rompa.<\u002Fp><\u002Fdiv>\n    <div style=\"display:flex;align-items:baseline;gap:26px;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:40px;font-weight:700;color:oklch(0.64 0.13 25);width:42px;\">I<\u002Fspan><p style=\"font-size:29px;line-height:1.4;margin:0;\">Segregación → conviene que esas interfaces sean <strong>chicas y específicas<\u002Fstrong>.<\u002Fp><\u002Fdiv>\n    <div style=\"display:flex;align-items:baseline;gap:26px;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:40px;font-weight:700;color:oklch(0.64 0.13 310);width:42px;\">D<\u002Fspan><p style=\"font-size:29px;line-height:1.4;margin:0;\">Inversión → <strong>cobrar()<\u002Fstrong> depende de <strong>Pago<\u002Fstrong> (abstracción), no de <strong>Tarjeta<\u002Fstrong> (concreto).<\u002Fp><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"border-left:3px solid oklch(0.72 0.13 258);padding-left:28px;\">\n    <p style=\"font-size:28px;line-height:1.45;margin:0;color:#d5dae3;\">Si entendés bien polimorfismo, SOLID deja de ser 5 reglas sueltas y pasa a ser <strong style=\"color:#eef0f2;\">5 usos del mismo martillo<\u002Fstrong>.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Calentamiento\" data-screen-label=\"07\" data-speaker-notes=\"Pregunta abierta. ¿Suena bien? Si diseño cambia el HTML del perfil, ¿qué clase tocás? Contá cuántas tareas distintas hace Usuario. Contestar en voz alta.\" style=\"height:100%;box-sizing:border-box;background:#f0e9db;color:#23262c;padding:64px 96px;display:flex;flex-direction:column;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.18em;text-transform:uppercase;color:oklch(0.62 0.13 70);margin-bottom:12px;\">Pará y pensá<\u002Fdiv>\n  <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:52px;font-weight:600;line-height:1.02;margin:0 0 28px;\">Antes de arrancar — calentemos<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:1.1fr 0.9fr;gap:56px;flex:1;align-items:center;\">\n    <div class=\"cd\"><pre><code class=\"language-typescript\">class Usuario {\n  guardarEnBaseDeDatos(): void { /* ... */ }\n  validarEmail(): boolean { /* ... */ return true; }\n  enviarMailBienvenida(): void { /* ... */ }\n  renderizarPerfilHTML(): string { /* ... */ return \"\"; }\n}<\u002Fcode><\u002Fpre><\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:26px;\">\n      <p style=\"font-size:29px;line-height:1.4;margin:0;\">¿Te <strong>suena bien<\u002Fstrong> o algo te hace ruido? ¿Por qué?<\u002Fp>\n      <p style=\"font-size:29px;line-height:1.4;margin:0;\">Si el equipo de diseño cambia el HTML del perfil, <strong>¿qué clase tocás?<\u002Fstrong> ¿Te gusta que sea <em>esa<\u002Fem>?<\u002Fp>\n      <p style=\"font-size:29px;line-height:1.4;margin:0;\">Contá cuántas \"tareas distintas\" hace <code style=\"font-family:'IBM Plex Mono',monospace;background:#e2d9c6;padding:2px 8px;border-radius:5px;\">Usuario<\u002Fcode>.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <p style=\"font-size:24px;line-height:1.4;margin:20px 0 0;color:#6b6f78;font-style:italic;\">Contestá en voz alta antes de pasar de slide. Todo lo que sientas acá lo vamos a poder nombrar con SOLID.<\u002Fp>\n<\u002Fsection>\n\n<section data-label=\"S — SRP\" data-screen-label=\"08\" data-speaker-notes=\"S: una clase, una responsabilidad, una razón para cambiar. Dos cosas distintas = dos motivos para modificarla, y cada motivo puede romper el otro.\" style=\"height:100%;box-sizing:border-box;background:#1a1d23;color:#eef0f2;padding:0;display:flex;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"width:640px;background:oklch(0.58 0.13 258);display:flex;align-items:center;justify-content:center;flex-shrink:0;\">\n    <span style=\"font-family:'Space Grotesk',sans-serif;font-size:440px;font-weight:700;color:#fff;line-height:1;\">S<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"flex:1;padding:92px 80px;display:flex;flex-direction:column;justify-content:center;\">\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.16em;text-transform:uppercase;color:oklch(0.72 0.12 258);margin-bottom:16px;\">Principio 1<\u002Fdiv>\n    <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:58px;font-weight:600;line-height:1.05;margin:0 0 24px;\">Responsabilidad Única<\u002Fh2>\n    <p style=\"font-size:32px;line-height:1.45;margin:0 0 20px;color:#e6e8ec;\">Una clase debe tener una sola responsabilidad → <strong>una sola razón para cambiar.<\u002Fstrong><\u002Fp>\n    <p style=\"font-size:27px;line-height:1.45;margin:0 0 36px;color:#a9afbd;\">Si una clase hace dos cosas distintas (manejar datos <em>y<\u002Fem> imprimirlos), tiene dos motivos para que la vengan a modificar. Y cada motivo es una chance de romper el otro.<\u002Fp>\n    <div style=\"display:flex;gap:44px;\">\n      <div><p style=\"font-size:24px;font-weight:600;margin:0 0 4px;\">Menos pruebas<\u002Fp><p style=\"font-size:22px;margin:0;color:#a9afbd;\">La clase hace menos.<\u002Fp><\u002Fdiv>\n      <div><p style=\"font-size:24px;font-weight:600;margin:0 0 4px;\">Menos acoplamiento<\u002Fp><p style=\"font-size:22px;margin:0;color:#a9afbd;\">Menos dependencias.<\u002Fp><\u002Fdiv>\n      <div><p style=\"font-size:24px;font-weight:600;margin:0 0 4px;\">Más legible<\u002Fp><p style=\"font-size:22px;margin:0;color:#a9afbd;\">Si la nombrás con un \"y\", sospechá.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"SRP — Antes\" data-screen-label=\"09\" data-speaker-notes=\"Book maneja el contenido pero también lo imprime. Si mañana hay que imprimir a archivo o cambiar formato, toco Book, que en teoría es 'el libro'.\" style=\"height:100%;box-sizing:border-box;background:#f4f1ea;color:#23262c;padding:60px 96px;display:flex;flex-direction:column;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:20px;\">\n    <span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.12em;text-transform:uppercase;color:#fff;background:oklch(0.58 0.14 25);padding:6px 18px;border-radius:6px;\">Antes<\u002Fspan>\n    <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:48px;font-weight:600;margin:0;\">SRP — la clase que hace de más<\u002Fh2>\n  <\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1.15fr 0.85fr;gap:48px;flex:1;min-height:0;align-items:center;\">\n    <div class=\"cd\"><pre style=\"font-size:23px;line-height:1.5;\"><code class=\"language-typescript\">class Book {\n  private name: string;\n  private author: string;\n  private text: string;\n\n  // constructor, getters y setters\n\n  replaceWordInText(word: string): string {\n    return this.text.replace(word, this.text);\n  }\n\n  isWordInText(word: string): boolean {\n    return this.text.includes(word);\n  }\n\n  printTextToConsole(): void {\n    // imprime el texto por consola\n  }\n}<\u002Fcode><\u002Fpre><\u002Fdiv>\n    <div>\n      <p style=\"font-size:29px;line-height:1.5;margin:0 0 24px;\"><code style=\"font-family:'IBM Plex Mono',monospace;background:#e9e2d4;padding:2px 8px;border-radius:5px;\">Book<\u002Fcode> manipula el contenido <em>y<\u002Fem> se ocupa de mostrarlo.<\u002Fp>\n      <p style=\"font-size:29px;line-height:1.5;margin:0;color:#4a4f59;\">¿Qué pasa si mañana hay que imprimir a un archivo, o cambiar el formato? Toco <strong>Book<\u002Fstrong>, una clase que en teoría es \"el libro\".<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Pará y pensá — SRP\" data-screen-label=\"10\" data-speaker-notes=\"Antes de mi solución: listá las razones de cambio de Book. ¿Por qué línea la cortás? ¿Qué método se va y cuál se queda? ¿Cómo llamarías a la clase nueva?\" style=\"height:100%;box-sizing:border-box;background:#f0e9db;color:#23262c;padding:72px 96px;display:flex;flex-direction:column;justify-content:center;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.18em;text-transform:uppercase;color:oklch(0.62 0.13 70);margin-bottom:16px;\">Pará y pensá<\u002Fdiv>\n  <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:60px;font-weight:600;line-height:1.02;margin:0 0 52px;\">¿Dónde cortás?<\u002Fh2>\n  <div style=\"display:flex;flex-direction:column;gap:34px;max-width:1500px;\">\n    <div style=\"display:flex;gap:28px;align-items:baseline;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:44px;font-weight:700;color:oklch(0.62 0.13 70);\">01<\u002Fspan><p style=\"font-size:33px;line-height:1.4;margin:0;\">Listá las <strong>razones de cambio<\u002Fstrong> de <code style=\"font-family:'IBM Plex Mono',monospace;background:#e2d9c6;padding:2px 8px;border-radius:5px;\">Book<\u002Fcode>. ¿Son una o más de una?<\u002Fp><\u002Fdiv>\n    <div style=\"display:flex;gap:28px;align-items:baseline;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:44px;font-weight:700;color:oklch(0.62 0.13 70);\">02<\u002Fspan><p style=\"font-size:33px;line-height:1.4;margin:0;\">Si tuvieras que partirla en dos clases, <strong>¿por qué línea la cortás?<\u002Fstrong> ¿Qué método se va y cuál se queda?<\u002Fp><\u002Fdiv>\n    <div style=\"display:flex;gap:28px;align-items:baseline;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:44px;font-weight:700;color:oklch(0.62 0.13 70);\">03<\u002Fspan><p style=\"font-size:33px;line-height:1.4;margin:0;\">¿Cómo llamarías a la clase nueva?<\u002Fp><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"SRP — Después\" data-screen-label=\"11\" data-speaker-notes=\"Separo en dos clases. Book cambia solo si cambia la lógica del libro; BookPrinter cambia solo si cambia la forma de imprimir.\" style=\"height:100%;box-sizing:border-box;background:#f4f1ea;color:#23262c;padding:56px 80px;display:flex;flex-direction:column;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:18px;\">\n    <span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.12em;text-transform:uppercase;color:#fff;background:oklch(0.55 0.13 155);padding:6px 18px;border-radius:6px;\">Después<\u002Fspan>\n    <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:44px;font-weight:600;margin:0;\">SRP — una responsabilidad por clase<\u002Fh2>\n  <\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1.25fr 0.75fr;gap:44px;flex:1;min-height:0;align-items:center;\">\n    <div class=\"cd\"><pre style=\"font-size:18px;line-height:1.4;\"><code class=\"language-typescript\">class Book {\n  private name: string;\n  private author: string;\n  private text: string;\n\n  replaceWordInText(word: string): string {\n    return this.text.replace(word, this.text);\n  }\n  isWordInText(word: string): boolean {\n    return this.text.includes(word);\n  }\n}\n\nclass BookPrinter {\n  printTextToConsole(text: string): void {\n    // imprime por consola\n  }\n  printTextToAnotherMedium(text: string): void {\n    // imprime en otro dispositivo\n  }\n}<\u002Fcode><\u002Fpre><\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;align-items:center;gap:20px;\" data-comment-anchor=\"67a30c4a38-div\">\n      <div style=\"display:flex;align-items:flex-start;gap:14px;\">\n        <div style=\"text-align:center;\">\n          <div style=\"background:#fff;border:2px solid #d8d2c4;border-radius:10px;overflow:hidden;min-width:220px;\">\n            <div style=\"background:#f7dcd6;padding:9px;font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:600;border-bottom:2px solid #d8d2c4;\">Book<\u002Fdiv>\n            <div style=\"padding:12px 16px;font-family:'IBM Plex Mono',monospace;font-size:20px;color:#4a4f59;text-align:left;line-height:1.55;\">+ replaceWord<br>+ isWordInText<br>+ printToConsole<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:10px;font-size:20px;color:oklch(0.52 0.15 25);font-weight:600;\">2 responsabilidades<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:26px;color:#8a8577;font-family:'IBM Plex Mono',monospace;\">separar ↓<\u002Fdiv>\n      <div style=\"display:flex;gap:20px;align-items:flex-start;\">\n        <div style=\"text-align:center;\">\n          <div style=\"background:#fff;border:2px solid #cbe0d4;border-radius:10px;overflow:hidden;min-width:185px;\">\n            <div style=\"background:#dcefe4;padding:9px;font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;border-bottom:2px solid #cbe0d4;\">Book<\u002Fdiv>\n            <div style=\"padding:12px 14px;font-family:'IBM Plex Mono',monospace;font-size:18px;color:#4a4f59;text-align:left;line-height:1.55;\">+ replaceWord<br>+ isWordInText<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:10px;font-size:19px;color:oklch(0.5 0.12 155);font-weight:600;\">1 resp.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align:center;\">\n          <div style=\"background:#fff;border:2px solid #cbe0d4;border-radius:10px;overflow:hidden;min-width:185px;\">\n            <div style=\"background:#dcefe4;padding:9px;font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;border-bottom:2px solid #cbe0d4;\">BookPrinter<\u002Fdiv>\n            <div style=\"padding:12px 14px;font-family:'IBM Plex Mono',monospace;font-size:18px;color:#4a4f59;text-align:left;line-height:1.55;\">+ printToConsole<br>+ printToMedium<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:10px;font-size:19px;color:oklch(0.5 0.12 155);font-weight:600;\">1 resp.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <p style=\"font-size:25px;line-height:1.4;margin:30px 0 0;color:#33373f;\" data-comment-anchor=\"9779d59fd6-p\"><strong>Book<\u002Fstrong> cambia solo si cambia la lógica del libro; <strong>BookPrinter<\u002Fstrong> cambia solo si cambia la forma de imprimir.<\u002Fp>\n<\u002Fsection>\n\n<section data-label=\"SRP — Olor\" data-screen-label=\"12\" data-speaker-notes=\"Olor a SRP: describís la clase con un 'y'; mezcla lógica de negocio + persistencia + presentación. Ojo: una responsabilidad no es un solo método, es un solo motivo de cambio.\" style=\"height:100%;box-sizing:border-box;background:#f4f1ea;color:#23262c;padding:72px 96px;display:flex;flex-direction:column;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.14em;text-transform:uppercase;color:oklch(0.55 0.14 25);margin-bottom:14px;\">SRP · Olor a código<\u002Fdiv>\n  <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:52px;font-weight:600;line-height:1.02;margin:0 0 36px;\">Sospechá que se viola SRP cuando…<\u002Fh2>\n  <div style=\"display:flex;flex-direction:column;gap:24px;max-width:1550px;flex:1;\">\n    <p style=\"font-size:31px;line-height:1.45;margin:0;padding-left:34px;position:relative;\"><span style=\"position:absolute;left:0;color:oklch(0.55 0.14 25);\">›<\u002Fspan>Para <strong>describir<\u002Fstrong> la clase usás un \"<strong>y<\u002Fstrong>\": <em>\"maneja el usuario y manda mails\"<\u002Fem>.<\u002Fp>\n    <p style=\"font-size:31px;line-height:1.45;margin:0;padding-left:34px;position:relative;\"><span style=\"position:absolute;left:0;color:oklch(0.55 0.14 25);\">›<\u002Fspan>La clase mezcla niveles distintos: <strong>lógica de negocio<\u002Fstrong> + <strong>persistencia<\u002Fstrong> + <strong>presentación<\u002Fstrong>.<\u002Fp>\n    <p style=\"font-size:31px;line-height:1.45;margin:0;padding-left:34px;position:relative;\"><span style=\"position:absolute;left:0;color:oklch(0.55 0.14 25);\">›<\u002Fspan>Un método toca cosas que no tienen nada que ver entre sí.<\u002Fp>\n    <div style=\"margin-top:8px;display:flex;gap:44px;\">\n      <p style=\"font-size:26px;line-height:1.4;margin:0;color:#4a4f59;\">Calcular algo <strong>≠<\u002Fstrong> guardarlo en base de datos.<\u002Fp>\n      <p style=\"font-size:26px;line-height:1.4;margin:0;color:#4a4f59;\"><code style=\"font-family:'IBM Plex Mono',monospace;\">Empleado<\u002Fcode> ≠ <code style=\"font-family:'IBM Plex Mono',monospace;\">CalculadorDeSueldo<\u002Fcode> ≠ <code style=\"font-family:'IBM Plex Mono',monospace;\">ReporteDeSueldo<\u002Fcode>.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"background:#1a1d23;color:#eef0f2;border-radius:12px;padding:24px 32px;\">\n    <p style=\"font-size:27px;line-height:1.4;margin:0;\">Ojo con exagerar: \"una responsabilidad\" no es \"un solo método\". Es <strong style=\"color:oklch(0.72 0.13 258);\">un solo motivo de cambio<\u002Fstrong>.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"O — OCP\" data-screen-label=\"13\" data-speaker-notes=\"O: abierta a la extensión, cerrada a la modificación. Para un comportamiento nuevo no debería editar código que ya funciona. La única excepción sana para tocar código viejo es corregir un bug.\" style=\"height:100%;box-sizing:border-box;background:#1a1d23;color:#eef0f2;padding:0;display:flex;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"width:640px;background:oklch(0.56 0.13 155);display:flex;align-items:center;justify-content:center;flex-shrink:0;\">\n    <span style=\"font-family:'Space Grotesk',sans-serif;font-size:440px;font-weight:700;color:#fff;line-height:1;\">O<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"flex:1;padding:92px 80px;display:flex;flex-direction:column;justify-content:center;\">\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.16em;text-transform:uppercase;color:oklch(0.75 0.12 155);margin-bottom:16px;\">Principio 2<\u002Fdiv>\n    <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:58px;font-weight:600;line-height:1.05;margin:0 0 24px;\">Abierto / Cerrado<\u002Fh2>\n    <p style=\"font-size:32px;line-height:1.45;margin:0 0 20px;color:#e6e8ec;\">Una clase debe estar <strong>abierta a la extensión<\u002Fstrong>, pero <strong>cerrada a la modificación.<\u002Fstrong><\u002Fp>\n    <p style=\"font-size:27px;line-height:1.45;margin:0 0 32px;color:#a9afbd;\">Para agregar un comportamiento nuevo, no debería tener que editar código que ya funciona (y ya está testeado). Agrego código nuevo, no toco el viejo.<\u002Fp>\n    <div style=\"display:flex;gap:50px;align-items:flex-start;\">\n      <p style=\"font-size:25px;line-height:1.4;margin:0;color:#c5cad4;max-width:520px;\">La única excepción sana para modificar código existente es <strong style=\"color:#fff;\">corregir un bug<\u002Fstrong>.<\u002Fp>\n      <p style=\"font-size:25px;line-height:1.4;margin:0;color:#c5cad4;max-width:420px;\">Herramienta clave: <strong style=\"color:#fff;\">interfaces + polimorfismo<\u002Fstrong>.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"OCP — Antes\" data-screen-label=\"14\" data-speaker-notes=\"Hay que guardar el libro. Primero a archivo. Luego piden también DB. La tentación: un if sobre el destino, tocando la clase que ya andaba. Cada destino nuevo obliga a reabrir BookPersistence.\" style=\"height:100%;box-sizing:border-box;background:#f4f1ea;color:#23262c;padding:56px 96px;display:flex;flex-direction:column;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:16px;\">\n    <span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.12em;text-transform:uppercase;color:#fff;background:oklch(0.58 0.14 25);padding:6px 18px;border-radius:6px;\">Antes<\u002Fspan>\n    <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:46px;font-weight:600;margin:0;\">OCP — el if que crece<\u002Fh2>\n  <\u002Fdiv>\n  <p style=\"font-size:27px;line-height:1.4;margin:0 0 20px;color:#4a4f59;\">Ahora hay que <strong>guardar<\u002Fstrong> el libro. Empezamos con un archivo… y al tiempo piden <strong>también<\u002Fstrong> base de datos. La tentación es un <code style=\"font-family:'IBM Plex Mono',monospace;background:#e9e2d4;padding:2px 8px;border-radius:5px;\">if<\u002Fcode>:<\u002Fp>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:36px;flex:1;min-height:0;align-items:center;\">\n    <div class=\"cd\"><pre style=\"font-size:23px;line-height:1.5;\"><code class=\"language-typescript\">class BookPersistence {\n  saveTextToFile(book: Book): void {\n    // guarda el texto en un archivo\n  }\n}<\u002Fcode><\u002Fpre><\u002Fdiv>\n    <div class=\"cd\"><pre style=\"font-size:22px;line-height:1.5;\"><code class=\"language-typescript\">class BookPersistence {\n  save(book: Book, destino: string): void {\n    if (destino === \"archivo\") { /* ... */ }\n    else if (destino === \"db\") { /* ... */ }\n    // ← toco la clase que ya andaba\n  }\n}<\u002Fcode><\u002Fpre><\u002Fdiv>\n  <\u002Fdiv>\n  <p style=\"font-size:26px;line-height:1.4;margin:18px 0 0;color:#33373f;\">Cada nuevo destino me obliga a <strong>volver a abrir y modificar<\u002Fstrong> <code style=\"font-family:'IBM Plex Mono',monospace;background:#e9e2d4;padding:2px 8px;border-radius:5px;\">BookPersistence<\u002Fcode>. Eso rompe OCP.<\u002Fp>\n<\u002Fsection>\n\n<section data-label=\"Razonemos — el if\" data-screen-label=\"15\" data-speaker-notes=\"Imaginá 6 destinos y entra el séptimo. ¿Qué podés romper sin querer de los otros 6, todos ya testeados? Pista Clase 1: distintos objetos responden distinto al mismo llamado → polimorfismo.\" style=\"height:100%;box-sizing:border-box;background:#f0e9db;color:#23262c;padding:72px 96px;display:flex;flex-direction:column;justify-content:center;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.18em;text-transform:uppercase;color:oklch(0.62 0.13 70);margin-bottom:16px;\">Razonemos<\u002Fdiv>\n  <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:56px;font-weight:600;line-height:1.02;margin:0 0 24px;max-width:1500px;\">El costo del <code style=\"font-family:'IBM Plex Mono',monospace;background:#e2d9c6;padding:4px 16px;border-radius:8px;\">if / else if<\u002Fcode><\u002Fh2>\n  <p style=\"font-size:30px;line-height:1.45;margin:0 0 46px;color:#4a4f59;max-width:1450px;\">Imaginá que ese <code style=\"font-family:'IBM Plex Mono',monospace;\">if / else if<\u002Fcode> ya tiene <strong>6 destinos<\u002Fstrong> y entra el séptimo.<\u002Fp>\n  <div style=\"display:flex;flex-direction:column;gap:30px;max-width:1500px;\">\n    <p style=\"font-size:31px;line-height:1.4;margin:0;\">¿Qué archivo tenés que abrir y editar? ¿Qué podés romper <strong>sin querer<\u002Fstrong> de los otros 6?<\u002Fp>\n    <p style=\"font-size:31px;line-height:1.4;margin:0;\">Todo ese código ya estaba <strong>testeado y andando<\u002Fstrong>. ¿Te gusta tener que volver a tocarlo?<\u002Fp>\n    <p style=\"font-size:31px;line-height:1.4;margin:0;\">Pista de la Clase 1: cuando distintos objetos responden distinto <strong>al mismo llamado<\u002Fstrong>… ¿qué herramienta usábamos?<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"OCP — Después\" data-screen-label=\"16\" data-speaker-notes=\"Defino un contrato (interfaz) y cada forma de guardar es una implementación aparte. Aparece la nube: creo CloudPersistence y no toco nada. Es el mismo truco de la Clase 1: programar contra interfaces.\" style=\"height:100%;box-sizing:border-box;background:#f4f1ea;color:#23262c;padding:56px 80px;display:flex;flex-direction:column;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:16px;\">\n    <span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.12em;text-transform:uppercase;color:#fff;background:oklch(0.55 0.13 155);padding:6px 18px;border-radius:6px;\">Después<\u002Fspan>\n    <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:44px;font-weight:600;margin:0;\">OCP — un contrato, muchas implementaciones<\u002Fh2>\n  <\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1.15fr 0.85fr;gap:44px;flex:1;min-height:0;align-items:center;\">\n    <div class=\"cd\"><pre style=\"font-size:22px;line-height:1.5;\"><code class=\"language-typescript\">interface BookPersistence {\n  save(book: Book): void;\n}\n\nclass TextFilePersistence implements BookPersistence {\n  save(book: Book): void {\n    // guarda a un archivo de texto\n  }\n}\n\nclass DbPersistence implements BookPersistence {\n  save(book: Book): void {\n    // guarda en base de datos\n  }\n}<\u002Fcode><\u002Fpre><\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;align-items:center;\">\n      <div style=\"background:#fff;border:2px solid #d8d2c4;border-radius:10px;overflow:hidden;text-align:center;min-width:230px;\">\n        <div style=\"background:#ece4d5;padding:7px 18px;border-bottom:2px solid #d8d2c4;\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:15px;font-style:italic;color:#8a8577;\">«interface»<\u002Fdiv><div style=\"font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;\">BookPersistence<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:8px 18px;font-family:'IBM Plex Mono',monospace;font-size:16px;color:#4a4f59;\">save(book)<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"color:#b7b1a3;font-size:24px;line-height:0.5;margin-top:6px;\">△<\u002Fdiv>\n      <div style=\"width:0;border-left:2px dashed #b7b1a3;height:16px;\"><\u002Fdiv>\n      <div style=\"width:88%;border-top:2px dashed #b7b1a3;height:0;\"><\u002Fdiv>\n      <div style=\"display:flex;gap:14px;justify-content:center;align-items:flex-start;\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;\"><div style=\"width:0;border-left:2px dashed #b7b1a3;height:18px;\"><\u002Fdiv><div style=\"background:#fff;border:2px solid #d8d2c4;border-radius:8px;padding:8px 10px;font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;\">TextFile<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;align-items:center;\"><div style=\"width:0;border-left:2px dashed #b7b1a3;height:18px;\"><\u002Fdiv><div style=\"background:#fff;border:2px solid #d8d2c4;border-radius:8px;padding:8px 10px;font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;\">Db<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;align-items:center;\"><div style=\"width:0;border-left:2px dashed oklch(0.6 0.13 155);height:18px;\"><\u002Fdiv><div style=\"background:#eef7f1;border:2px dashed oklch(0.6 0.13 155);border-radius:8px;padding:8px 10px;font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;color:oklch(0.42 0.12 155);\">Cloud<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-size:19px;line-height:1.4;color:oklch(0.45 0.12 155);text-align:center;margin:16px 6px 0;font-weight:600;\">Cloud se agrega sin tocar el resto.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <p style=\"font-size:25px;line-height:1.4;margin:14px 0 0;color:#33373f;\">Es el mismo truco de la Clase 1: <strong>programar contra interfaces<\u002Fstrong>. Las implementaciones quedan intercambiables y el cliente ni se entera.<\u002Fp>\n<\u002Fsection>\n\n<section data-label=\"OCP — Olor\" data-screen-label=\"17\" data-speaker-notes=\"Olor a OCP: cadenas de if/else if o switch sobre un tipo que va a crecer. La cura casi siempre es la misma: reemplazar el switch por polimorfismo.\" style=\"height:100%;box-sizing:border-box;background:#f4f1ea;color:#23262c;padding:72px 96px;display:flex;flex-direction:column;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.14em;text-transform:uppercase;color:oklch(0.55 0.14 25);margin-bottom:14px;\">OCP · Olor a código<\u002Fdiv>\n  <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:52px;font-weight:600;line-height:1.02;margin:0 0 36px;\">Sospechá violación de OCP cuando…<\u002Fh2>\n  <div style=\"display:flex;flex-direction:column;gap:26px;max-width:1550px;flex:1;\">\n    <p style=\"font-size:31px;line-height:1.45;margin:0;padding-left:34px;position:relative;\"><span style=\"position:absolute;left:0;color:oklch(0.55 0.14 25);\">›<\u002Fspan>Ves cadenas de <code style=\"font-family:'IBM Plex Mono',monospace;background:#e9e2d4;padding:2px 8px;border-radius:5px;\">if / else if<\u002Fcode> o <code style=\"font-family:'IBM Plex Mono',monospace;background:#e9e2d4;padding:2px 8px;border-radius:5px;\">switch<\u002Fcode> sobre un \"tipo\" que sabés que <strong>va a crecer<\u002Fstrong>.<\u002Fp>\n    <p style=\"font-size:31px;line-height:1.45;margin:0;padding-left:34px;position:relative;\"><span style=\"position:absolute;left:0;color:oklch(0.55 0.14 25);\">›<\u002Fspan>Cada feature nuevo te obliga a <strong>editar la misma clase<\u002Fstrong> una y otra vez.<\u002Fp>\n    <p style=\"font-size:31px;line-height:1.45;margin:0;padding-left:34px;position:relative;\"><span style=\"position:absolute;left:0;color:oklch(0.55 0.14 25);\">›<\u002Fspan>Encontrás comentarios tipo <em>\"si agregás un tipo nuevo, acordate de tocar acá, acá y acá\"<\u002Fem>.<\u002Fp>\n  <\u002Fdiv>\n  <div style=\"background:#1a1d23;color:#eef0f2;border-radius:12px;padding:24px 32px;\">\n    <p style=\"font-size:27px;line-height:1.4;margin:0;\">La cura casi siempre es la misma: reemplazar el <code style=\"font-family:'IBM Plex Mono',monospace;color:#e6e8ec;\">switch<\u002Fcode> por <strong style=\"color:oklch(0.75 0.13 155);\">polimorfismo<\u002Fstrong> — una interfaz + una clase por caso.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"L — LSP\" data-screen-label=\"18\" data-speaker-notes=\"L: si B es subclase de A, puedo usar un B donde se espera un A sin que se rompa. Barbara Liskov, 1987. La subclase no debe romper las promesas del padre. Es la contracara del polimorfismo.\" style=\"height:100%;box-sizing:border-box;background:#1a1d23;color:#eef0f2;padding:0;display:flex;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"width:640px;background:oklch(0.63 0.13 70);display:flex;align-items:center;justify-content:center;flex-shrink:0;\">\n    <span style=\"font-family:'Space Grotesk',sans-serif;font-size:440px;font-weight:700;color:#fff;line-height:1;\">L<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"flex:1;padding:92px 80px;display:flex;flex-direction:column;justify-content:center;\">\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.16em;text-transform:uppercase;color:oklch(0.8 0.12 75);margin-bottom:16px;\">Principio 3<\u002Fdiv>\n    <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:58px;font-weight:600;line-height:1.05;margin:0 0 24px;\">Sustitución de Liskov<\u002Fh2>\n    <p style=\"font-size:31px;line-height:1.45;margin:0 0 20px;color:#e6e8ec;\">Si <strong>B<\u002Fstrong> es subclase de <strong>A<\u002Fstrong>, tengo que poder usar un <strong>B<\u002Fstrong> en cualquier lado donde se espera un <strong>A<\u002Fstrong>, sin que la aplicación se rompa.<\u002Fp>\n    <p style=\"font-size:27px;line-height:1.45;margin:0 0 28px;color:#a9afbd;\">Lo formuló <strong>Barbara Liskov<\u002Fstrong> en 1987. Una subclase <strong>no debe romper las promesas<\u002Fstrong> de su clase padre: si heredás, tenés que comportarte como lo que heredaste.<\u002Fp>\n    <p style=\"font-size:25px;line-height:1.4;margin:0;color:#c5cad4;max-width:820px;\">Es la contracara del polimorfismo: solo puedo tratar a los hijos \"como el padre\" si de verdad <strong style=\"color:#fff;\">se comportan<\u002Fstrong> como el padre.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"LSP — Antes\" data-screen-label=\"19\" data-speaker-notes=\"DumbDog es un Dog según el compilador, pero si reemplazo un Dog por un DumbDog la app explota al llamar makeNoise(). Cumple la firma, pero traiciona el contrato.\" style=\"height:100%;box-sizing:border-box;background:#f4f1ea;color:#23262c;padding:56px 96px;display:flex;flex-direction:column;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:18px;\">\n    <span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.12em;text-transform:uppercase;color:#fff;background:oklch(0.58 0.14 25);padding:6px 18px;border-radius:6px;\">Antes<\u002Fspan>\n    <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:46px;font-weight:600;margin:0;\">LSP — el hijo que traiciona el contrato<\u002Fh2>\n  <\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1.05fr 0.95fr;gap:48px;flex:1;min-height:0;align-items:center;\">\n    <div class=\"cd\"><pre style=\"font-size:22px;line-height:1.5;\"><code class=\"language-typescript\">abstract class Animal {\n  abstract makeNoise(): void;\n}\n\nclass Dog extends Animal {\n  makeNoise(): void { console.log(\"guau guau\"); }\n}\nclass Cat extends Animal {\n  makeNoise(): void { console.log(\"miau miau\"); }\n}\n\nclass DumbDog extends Dog {\n  makeNoise(): void {\n    throw new Error(\"no puedo hacer ruido\"); // ← rompe la promesa\n  }\n}<\u002Fcode><\u002Fpre><\u002Fdiv>\n    <div>\n      <p style=\"font-size:29px;line-height:1.5;margin:0;\"><code style=\"font-family:'IBM Plex Mono',monospace;background:#e9e2d4;padding:2px 8px;border-radius:5px;\">DumbDog<\u002Fcode> <strong>es un<\u002Fstrong> <code style=\"font-family:'IBM Plex Mono',monospace;background:#e9e2d4;padding:2px 8px;border-radius:5px;\">Dog<\u002Fcode> según el compilador, pero si en el código cliente reemplazo un <strong>Dog<\u002Fstrong> por un <strong>DumbDog<\u002Fstrong>, la app <strong style=\"color:oklch(0.52 0.15 25);\">explota<\u002Fstrong> al llamar <code style=\"font-family:'IBM Plex Mono',monospace;background:#e9e2d4;padding:2px 8px;border-radius:5px;\">makeNoise()<\u002Fcode>.<\u002Fp>\n      <p style=\"font-size:29px;line-height:1.5;margin:24px 0 0;color:#4a4f59;\">Cumple la firma, pero <strong>traiciona el contrato<\u002Fstrong>.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"LSP — Cuadrado/Rectángulo\" data-screen-label=\"20\" data-speaker-notes=\"El clásico: un cuadrado es un rectángulo en geometría, pero en código no. El cliente recibe un Rectangulo y setea ancho 5 y alto 4. Predecí area() si es Rectangulo y si por debajo es Cuadrado.\" style=\"height:100%;box-sizing:border-box;background:#f4f1ea;color:#23262c;padding:52px 80px;display:flex;flex-direction:column;font-family:'IBM Plex Sans',sans-serif;\">\n  <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:44px;font-weight:600;margin:0 0 8px;\">El caso clásico: Cuadrado / Rectángulo<\u002Fh2>\n  <p style=\"font-size:25px;line-height:1.4;margin:0 0 20px;color:#4a4f59;\">\"Un cuadrado <strong>es un<\u002Fstrong> rectángulo\", ¿no? En geometría sí; en código, cuidado.<\u002Fp>\n  <div style=\"display:grid;grid-template-columns:1.3fr 0.7fr;gap:40px;flex:1;min-height:0;align-items:center;\">\n    <div class=\"cd\"><pre style=\"font-size:20px;line-height:1.5;\"><code class=\"language-typescript\" data-comment-anchor=\"1c77727b9c-code\">class Rectangulo {\n  constructor(protected ancho: number, protected alto: number) {}\n  setAncho(a: number) { this.ancho = a; }\n  setAlto(a: number)  { this.alto = a; }\n  area(): number { return this.ancho * this.alto; }\n}\n\nclass Cuadrado extends Rectangulo {\n  setAncho(a: number) { this.ancho = a; this.alto = a; } // fuerza lados iguales\n  setAlto(a: number)  { this.ancho = a; this.alto = a; }\n}<\u002Fcode><\u002Fpre><\u002Fdiv>\n    <div>\n      <p style=\"font-size:26px;line-height:1.4;margin:0 0 16px;\">Un cliente recibe algo declarado como <strong>Rectangulo<\u002Fstrong>:<\u002Fp>\n      <div class=\"cd\" style=\"padding:18px 22px;\"><pre style=\"font-size:20px;line-height:1.5;\"><code class=\"language-typescript\">rect.setAncho(5);\nrect.setAlto(4);\nconst a = rect.area();<\u002Fcode><\u002Fpre><\u002Fdiv>\n      <p style=\"font-size:24px;line-height:1.4;margin:18px 0 0;color:#33373f;\">¿Cuánto vale <code style=\"font-family:'IBM Plex Mono',monospace;background:#e9e2d4;padding:2px 6px;border-radius:5px;\">a<\u002Fcode> si es <strong>Rectangulo<\u002Fstrong>? ¿Y si por debajo es <strong>Cuadrado<\u002Fstrong>? <strong>Escribí los dos números.<\u002Fstrong><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"LSP — La trampa\" data-screen-label=\"21\" data-speaker-notes=\"Rectangulo da 20; Cuadrado da 16 porque cada set iguala los lados. El cliente pidió ancho 5 y se lo ignoraron por la espalda. 'Es un' en lenguaje natural no garantiza 'es un' en el diseño.\" style=\"height:100%;box-sizing:border-box;background:#f4f1ea;color:#23262c;padding:64px 96px;display:flex;flex-direction:column;justify-content:center;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.14em;text-transform:uppercase;color:oklch(0.62 0.13 70);margin-bottom:16px;\">LSP · La trampa<\u002Fdiv>\n  <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:52px;font-weight:600;line-height:1.02;margin:0 0 44px;\">El mismo código, dos resultados<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-bottom:40px;\">\n    <div style=\"background:#fff;border:1px solid #e4ddcf;border-radius:14px;padding:34px 40px;\">\n      <p style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;color:#6b6f78;margin:0 0 10px;\">rect es Rectangulo<\u002Fp>\n      <p style=\"font-size:30px;line-height:1.4;margin:0;\">area() da <span style=\"font-family:'Space Grotesk',sans-serif;font-size:38px;font-weight:700;color:oklch(0.5 0.12 155);\" data-comment-anchor=\"5b9c92a4c1-span\">20<\u002Fspan> &nbsp;(5 × 4) → lo que el cliente espera.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border:1px solid #e4ddcf;border-radius:14px;padding:34px 40px;\">\n      <p style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;color:#6b6f78;margin:0 0 10px;\">rect es Cuadrado por debajo<\u002Fp>\n      <p style=\"font-size:30px;line-height:1.4;margin:0;\">cada set iguala los lados: 4 × 4 = <span style=\"font-family:'Space Grotesk',sans-serif;font-size:38px;font-weight:700;color:oklch(0.52 0.15 25);\" data-comment-anchor=\"1a04506cf3-span\">16<\u002Fspan>. El ancho 5 <strong>se ignoró por la espalda.<\u002Fstrong><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"border-left:3px solid oklch(0.62 0.13 70);padding-left:28px;max-width:1550px;\">\n    <p style=\"font-size:29px;line-height:1.45;margin:0;color:#33373f;\">\"Es un\" en el lenguaje natural <strong>no<\u002Fstrong> garantiza \"es un\" en el diseño. La herencia se gana <strong>comportándose igual<\u002Fstrong>, no solo compartiendo nombre.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"LSP — Olor\" data-screen-label=\"22\" data-speaker-notes=\"Olor a LSP: la subclase lanza excepciones, deja métodos vacíos, o el cliente necesita instanceof. Si escribís instanceof para arreglar el comportamiento de un hijo, la herencia está mal planteada; a veces la solución es composición.\" style=\"height:100%;box-sizing:border-box;background:#f4f1ea;color:#23262c;padding:72px 96px;display:flex;flex-direction:column;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.14em;text-transform:uppercase;color:oklch(0.55 0.14 25);margin-bottom:14px;\">LSP · Olor a código<\u002Fdiv>\n  <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:48px;font-weight:600;line-height:1.02;margin:0 0 34px;\">Sospechá violación de LSP cuando una subclase…<\u002Fh2>\n  <div style=\"display:flex;flex-direction:column;gap:22px;max-width:1600px;flex:1;\">\n    <p style=\"font-size:30px;line-height:1.4;margin:0;padding-left:34px;position:relative;\"><span style=\"position:absolute;left:0;color:oklch(0.55 0.14 25);\">›<\u002Fspan><strong>Lanza excepciones<\u002Fstrong> en métodos que en el padre funcionaban.<\u002Fp>\n    <p style=\"font-size:30px;line-height:1.4;margin:0;padding-left:34px;position:relative;\"><span style=\"position:absolute;left:0;color:oklch(0.55 0.14 25);\">›<\u002Fspan><strong>Deja métodos vacíos<\u002Fstrong> o con \"no hace nada\" porque \"no aplican\".<\u002Fp>\n    <p style=\"font-size:30px;line-height:1.4;margin:0;padding-left:34px;position:relative;\"><span style=\"position:absolute;left:0;color:oklch(0.55 0.14 25);\">›<\u002Fspan>Necesita que el cliente pregunte <code style=\"font-family:'IBM Plex Mono',monospace;background:#e9e2d4;padding:2px 8px;border-radius:5px;\">if (obj instanceof SubclaseX)<\u002Fcode> para tratarla distinto.<\u002Fp>\n    <p style=\"font-size:30px;line-height:1.4;margin:0;padding-left:34px;position:relative;\"><span style=\"position:absolute;left:0;color:oklch(0.55 0.14 25);\">›<\u002Fspan><strong>Endurece precondiciones<\u002Fstrong> o <strong>debilita postcondiciones<\u002Fstrong> (pide más / entrega menos que el padre).<\u002Fp>\n  <\u002Fdiv>\n  <div style=\"background:#1a1d23;color:#eef0f2;border-radius:12px;padding:24px 32px;\">\n    <p style=\"font-size:27px;line-height:1.4;margin:0;\">Si escribís <code style=\"font-family:'IBM Plex Mono',monospace;color:#e6e8ec;\">instanceof<\u002Fcode> para \"arreglar\" a un hijo, la herencia está mal planteada. A veces la solución es <strong style=\"color:oklch(0.75 0.13 258);\">composición<\u002Fstrong> en vez de herencia.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Checkpoint\" data-screen-label=\"23\" data-speaker-notes=\"Vamos por la mitad. Que expliquen S, O, L con sus palabras. ¿Qué se repite en las tres soluciones? Spoiler: interfaces y polimorfismo. Es el hilo de la clase.\" style=\"height:100%;box-sizing:border-box;background:#f0e9db;color:#23262c;padding:72px 96px;display:flex;flex-direction:column;justify-content:center;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.18em;text-transform:uppercase;color:oklch(0.62 0.13 70);margin-bottom:16px;\">Checkpoint<\u002Fdiv>\n  <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:56px;font-weight:600;line-height:1.02;margin:0 0 44px;\">Vamos por la mitad — explicámelo con tus palabras<\u002Fh2>\n  <div style=\"display:flex;flex-direction:column;gap:28px;max-width:1550px;margin-bottom:40px;\">\n    <div style=\"display:flex;gap:28px;align-items:baseline;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:48px;font-weight:700;color:oklch(0.58 0.13 258);width:44px;\">S<\u002Fspan><p style=\"font-size:32px;line-height:1.4;margin:0;\">Una clase, ¿qué…?<\u002Fp><\u002Fdiv>\n    <div style=\"display:flex;gap:28px;align-items:baseline;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:48px;font-weight:700;color:oklch(0.56 0.13 155);width:44px;\">O<\u002Fspan><p style=\"font-size:32px;line-height:1.4;margin:0;\">Abierta a… / cerrada a…<\u002Fp><\u002Fdiv>\n    <div style=\"display:flex;gap:28px;align-items:baseline;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:48px;font-weight:700;color:oklch(0.63 0.13 70);width:44px;\">L<\u002Fspan><p style=\"font-size:32px;line-height:1.4;margin:0;\">Una subclase no debe…<\u002Fp><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"border-left:3px solid oklch(0.62 0.13 70);padding-left:28px;max-width:1550px;\">\n    <p style=\"font-size:28px;line-height:1.45;margin:0;color:#33373f;\">¿Notaste algo que se repite en las tres soluciones? Casi siempre aparecen <strong>interfaces<\u002Fstrong> y <strong>polimorfismo<\u002Fstrong>. Es el hilo de toda la clase.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"I — ISP\" data-screen-label=\"24\" data-speaker-notes=\"I: ninguna clase debería implementar métodos que no usa. Interfaces gordas → dividirlas en chicas y específicas. Es el SRP de las interfaces.\" style=\"height:100%;box-sizing:border-box;background:#1a1d23;color:#eef0f2;padding:0;display:flex;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"width:640px;background:oklch(0.58 0.13 25);display:flex;align-items:center;justify-content:center;flex-shrink:0;\">\n    <span style=\"font-family:'Space Grotesk',sans-serif;font-size:440px;font-weight:700;color:#fff;line-height:1;\">I<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"flex:1;padding:92px 80px;display:flex;flex-direction:column;justify-content:center;\">\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.16em;text-transform:uppercase;color:oklch(0.75 0.12 25);margin-bottom:16px;\">Principio 4<\u002Fdiv>\n    <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:54px;font-weight:600;line-height:1.05;margin:0 0 24px;\">Segregación de Interfaces<\u002Fh2>\n    <p style=\"font-size:32px;line-height:1.45;margin:0 0 20px;color:#e6e8ec;\">Ninguna clase debería estar obligada a implementar <strong>métodos que no usa.<\u002Fstrong><\u002Fp>\n    <p style=\"font-size:27px;line-height:1.45;margin:0 0 28px;color:#a9afbd;\">Interfaces grandes (\"gordas\", con muchos métodos) → dividirlas en interfaces <strong>chicas y específicas<\u002Fstrong>. Así cada clase implementa solo lo que le corresponde.<\u002Fp>\n    <p style=\"font-size:25px;line-height:1.4;margin:0;color:#c5cad4;max-width:820px;\">Es el <strong style=\"color:#fff;\">SRP de las interfaces<\u002Fstrong>: una interfaz también debería tener un propósito acotado.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"ISP — Antes\" data-screen-label=\"25\" data-speaker-notes=\"Una interfaz mezcla imprimir con tener papel. ConsolePrinter está forzada a implementar hasPaper(), que no tiene sentido para una consola. Termina tirando un error.\" style=\"height:100%;box-sizing:border-box;background:#f4f1ea;color:#23262c;padding:56px 96px;display:flex;flex-direction:column;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:18px;\">\n    <span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.12em;text-transform:uppercase;color:#fff;background:oklch(0.58 0.14 25);padding:6px 18px;border-radius:6px;\">Antes<\u002Fspan>\n    <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:46px;font-weight:600;margin:0;\">ISP — la interfaz gorda<\u002Fh2>\n  <\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1.1fr 0.9fr;gap:48px;flex:1;min-height:0;align-items:center;\">\n    <div class=\"cd\"><pre style=\"font-size:23px;line-height:1.5;\"><code class=\"language-typescript\">interface IPrinter {\n  print(text: string): void;\n  hasPaper(): boolean;\n}\n\nclass ConsolePrinter implements IPrinter {\n  print(text: string): void { /* imprime por consola */ }\n\n  hasPaper(): boolean {\n    throw new Error(\"una consola no tiene papel\"); // ← método que sobra\n  }\n}<\u002Fcode><\u002Fpre><\u002Fdiv>\n    <div>\n      <p style=\"font-size:29px;line-height:1.5;margin:0;\"><code style=\"font-family:'IBM Plex Mono',monospace;background:#e9e2d4;padding:2px 8px;border-radius:5px;\">ConsolePrinter<\u002Fcode> está <strong>forzada<\u002Fstrong> a implementar <code style=\"font-family:'IBM Plex Mono',monospace;background:#e9e2d4;padding:2px 8px;border-radius:5px;\">hasPaper()<\u002Fcode>, que no tiene ningún sentido para una consola.<\u002Fp>\n      <p style=\"font-size:29px;line-height:1.5;margin:24px 0 0;color:#4a4f59;\">Termina tirando un error o devolviendo cualquier cosa.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"ISP — Después\" data-screen-label=\"26\" data-speaker-notes=\"Parto la interfaz gorda en dos contratos chicos. La consola implementa solo lo que usa. La impresora de papel implementa las dos: en TS una clase puede implementar varias interfaces.\" style=\"height:100%;box-sizing:border-box;background:#f4f1ea;color:#23262c;padding:52px 80px;display:flex;flex-direction:column;font-family:'IBM Plex Sans',sans-serif;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\">\n    <span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.12em;text-transform:uppercase;color:#fff;background:oklch(0.55 0.13 155);padding:6px 18px;border-radius:6px;\">Después<\u002Fspan>\n    <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:44px;font-weight:600;margin:0;\">ISP — contratos chicos y específicos<\u002Fh2>\n  <\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1.2fr 0.8fr;gap:44px;flex:1;min-height:0;align-items:center;\">\n    <div class=\"cd\"><pre style=\"font-size:20px;line-height:1.45;\"><code class=\"language-typescript\">interface IBookPrinter {\n  print(text: string): void;\n}\ninterface IPaperBookPrinter {\n  hasPaper(): boolean;\n}\n\nclass ConsolePrinter implements IBookPrinter {\n  print(text: string): void { /* consola */ }\n}\n\nclass PaperPrinter implements IBookPrinter, IPaperBookPrinter {\n  print(text: string): void { /* en papel */ }\n  hasPaper(): boolean { return true; }\n}<\u002Fcode><\u002Fpre><\u002Fdiv>\n    <div style=\"display:flex;gap:30px;justify-content:center;\" data-comment-anchor=\"73b192e21b-div\">\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:12px;\">\n        <div style=\"background:#fff;border:2px solid #d8d2c4;border-radius:10px;overflow:hidden;text-align:center;min-width:210px;\">\n          <div style=\"background:#ece4d5;padding:9px;border-bottom:2px solid #d8d2c4;\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:17px;font-style:italic;color:#8a8577;\">«interface»<\u002Fdiv><div style=\"font-family:'IBM Plex Mono',monospace;font-size:21px;font-weight:600;\">IBookPrinter<\u002Fdiv><\u002Fdiv>\n          <div style=\"padding:9px;font-family:'IBM Plex Mono',monospace;font-size:18px;color:#4a4f59;\">print()<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"color:#b7b1a3;font-size:26px;line-height:0.5;\">△<\u002Fdiv>\n        <div style=\"width:0;border-left:2px dashed #b7b1a3;height:18px;\"><\u002Fdiv>\n        <div style=\"background:#fff;border:2px solid #d8d2c4;border-radius:9px;padding:11px 16px;font-family:'IBM Plex Mono',monospace;font-size:19px;font-weight:600;\">ConsolePrinter<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:12px;\">\n        <div style=\"background:#fff;border:2px solid #d8d2c4;border-radius:10px;overflow:hidden;text-align:center;min-width:210px;\">\n          <div style=\"background:#ece4d5;padding:9px;border-bottom:2px solid #d8d2c4;\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:17px;font-style:italic;color:#8a8577;\">«interface»<\u002Fdiv><div style=\"font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;\">IPaperBookPrinter<\u002Fdiv><\u002Fdiv>\n          <div style=\"padding:9px;font-family:'IBM Plex Mono',monospace;font-size:18px;color:#4a4f59;\">hasPaper()<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"color:#b7b1a3;font-size:26px;line-height:0.5;\">△<\u002Fdiv>\n        <div style=\"width:0;border-left:2px dashed #b7b1a3;height:18px;\"><\u002Fdiv>\n        <div style=\"background:#fff;border:2px solid #d8d2c4;border-radius:9px;padding:11px 16px;font-family:'IBM Plex Mono',monospace;font-size:19px;font-weight:600;\">PaperPrinter<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <p style=\"font-size:25px;line-he
